<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cinematic Bio Lab | Ashita Jawali</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #02030a;
  font-family: monospace;
  cursor: url('https://cur.cursors-4u.net/cursors/cur-9/cur817.ani'), auto;
}

#panel {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 420px;
  max-height: 85vh;
  overflow-y: auto;
  background: rgba(0,0,0,0.9);
  color: white;
  padding: 20px;
  display: none;
  border: 1px solid #00ffaa;
}

h2 { color:#00ffaa; }

.tag { display:inline-block; padding:4px; margin:2px; background:#111; color:#5e9eff; }

#boot {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 50%;
  color: #00ffaa;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="boot">CLICK TO START BIO LAB SIMULATION</div>
<div id="panel"></div>

<script>

let scene, camera, renderer;
let workspace, dnaGroup, rainGroup;
let isZoomed = false;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

const nodes = [

{
title:"ABOUT",
html:`Bioinformatician | CMU | Multi-omics + ML`
},

{
title:"PROJECTS",
html:`<b>Lung Cancer Biomarker</b><br>RNA-seq + ML models<br><br>
<b>COVID Vaccine Study</b><br>Random Forest / XGBoost<br><br>
<b>NexTSS</b><br>Deep learning TSS detection<br><br>
<b>Diabetes Prediction</b><br>ML risk model<br><br>
<b>SARS-CoV2 Docking</b><br>Drug repurposing`
},

{
title:"EXPERIENCE",
html:`KDHE Bioinformatician<br>Nextflow pipelines<br><br>
BitGenome Mentor<br>Teaching genomics<br><br>
CMU TA<br>Statistical programming`
},

{
title:"PUBLICATIONS",
html:`Micro/Nanoplastics detection review`
},

{
title:"SKILLS",
html:`Python, R, SQL, Nextflow, Docker, ML, RNA-seq`
}

];

// ---------------- INIT ----------------
init();
function init(){

scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ---------------- DESKTOP ----------------
workspace = new THREE.Group();

let desk = new THREE.Mesh(
new THREE.BoxGeometry(10,0.3,5),
new THREE.MeshStandardMaterial({color:0x111111})
);
desk.position.y = -2;

let chair = new THREE.Mesh(
new THREE.CylinderGeometry(0.6,0.6,1.5),
new THREE.MeshStandardMaterial({color:0x222222})
);
chair.position.set(0,-1.5,2);

let monitor = new THREE.Mesh(
new THREE.BoxGeometry(4,2.5,0.2),
new THREE.MeshStandardMaterial({color:0x000000})
);

let screen = new THREE.Mesh(
new THREE.PlaneGeometry(3.8,2.2),
new THREE.MeshBasicMaterial({color:0x00ffaa,opacity:0.25,transparent:true})
);
screen.position.z = 0.11;

monitor.add(screen);
workspace.add(desk,chair,monitor);
scene.add(workspace);

// ---------------- DNA ----------------
dnaGroup = new THREE.Group();
dnaGroup.visible = false;

const bases = ["A","T","C","G"];

for(let i=0;i<25;i++){

let y = i*0.6 - 6;
let angle = i*0.4;

let base1 = bases[i%4];
let base2 = base1==="A"?"T":base1==="T"?"A":base1==="C"?"G":"C";

let left = sphere(0x00ffaa);
let right = sphere(0x5e9eff);

left.position.set(Math.cos(angle)*2,y,Math.sin(angle)*2);
right.position.set(Math.cos(angle+Math.PI)*2,y,Math.sin(angle+Math.PI)*2);

dnaGroup.add(left,right);

// backbone bond
let line = new THREE.Mesh(
new THREE.CylinderGeometry(0.02,0.02,4),
new THREE.MeshBasicMaterial({color:0xffffff,opacity:0.2,transparent:true})
);
line.rotation.z = Math.PI/2;
line.position.y = y;
dnaGroup.add(line);
}

scene.add(dnaGroup);

// ---------------- RAIN ----------------
rainGroup = new THREE.Group();
rainGroup.visible = false;

const emojis = ["🦠","🧫","🍄","⚗️","🔬"];

for(let i=0;i<120;i++){
let tex = createEmoji(emojis[Math.floor(Math.random()*emojis.length)]);
let spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
spr.position.set(Math.random()*30-15,Math.random()*30+10,Math.random()*10);
spr.scale.set(0.5,0.5,0.5);
spr.userData.speed = 0.02+Math.random()*0.03;
rainGroup.add(spr);
}

scene.add(rainGroup);

// ---------------- LIGHT ----------------
scene.add(new THREE.AmbientLight(0xffffff,1.2));

camera.position.z = 10;

// ---------------- CLICK ----------------
window.addEventListener("click",onClick);

animate();
}

// ---------------- CLICK FLOW ----------------
function onClick(){

if(!isZoomed){

gsap.to(camera.position,{
z:1.5,duration:2,
onComplete:()=>{

workspace.visible=false;
dnaGroup.visible=true;
rainGroup.visible=true;

gsap.to(camera.position,{z:12,duration:1.5});
}
});

document.getElementById("boot").style.display="none";
isZoomed=true;

}else{

raycaster.setFromCamera(mouse,camera);
let hits = raycaster.intersectObjects(dnaGroup.children);

if(hits.length){
let p=document.getElementById("panel");
p.style.display="block";
p.innerHTML=`<h2>${nodes[0].title}</h2>${nodes[0].html}`;
}
}
}

// ---------------- HELPERS ----------------
function sphere(color){
return new THREE.Mesh(
new THREE.SphereGeometry(0.15,16,16),
new THREE.MeshStandardMaterial({color})
);
}

function createEmoji(e){
let c=document.createElement("canvas");
c.width=64;c.height=64;
let ctx=c.getContext("2d");
ctx.font="40px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(e,32,32);
return new THREE.CanvasTexture(c);
}

// ---------------- ANIMATE ----------------
function animate(){
requestAnimationFrame(animate);

if(rainGroup.visible){
rainGroup.children.forEach(r=>{
r.position.y -= r.userData.speed;
if(r.position.y<-10) r.position.y=20;
});
}

dnaGroup.rotation.y += 0.002;

renderer.render(scene,camera);
}

</script>

</body>
</html>
