<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ashita Jawali | Bio-Interactive Terminal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root {
      --bg: #050a14;
      --panel: rgba(11, 18, 32, 0.92);
      --accent: #7aa2ff;
      --accent2: #7affd0;
      --text: #e9eefc;
      --muted: #b7c3e6;
    }

    /* CUSTOM BACTERIA CURSOR */
    body { 
      margin: 0; 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      overflow: hidden;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="%237affd0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/></svg>'), auto;
    }

    /* BIO-NEBULA BACKGROUND */
    #canvas-container { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
      background: radial-gradient(circle at 50% 50%, #111d33 0%, #050a14 100%);
    }

    #info-panel {
      position: absolute;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      width: 450px;
      max-height: 85vh;
      overflow-y: auto;
      background: var(--panel);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(122, 255, 208, 0.25);
      border-radius: 24px;
      padding: 35px;
      z-index: 10;
      box-shadow: 0 0 60px rgba(0,0,0,0.7);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .hidden { opacity: 0; transform: translateY(-40%) scale(0.95); pointer-events: none; }

    #panel-content img {
      width: 110px; height: 110px; border-radius: 22px; 
      border: 2px solid var(--accent); margin-bottom: 15px;
    }

    h2 { color: var(--accent2); margin: 0 0 15px; font-size: 22px; font-weight: 900; letter-spacing: 1px; }
    .section-title { color: var(--accent); font-weight: 800; font-size: 14px; margin-top: 15px; display: block; text-transform: uppercase; }
    .muted { color: var(--muted); font-size: 14.5px; line-height: 1.6; }
    
    .resume-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: var(--accent2);
      color: #050a14;
      text-decoration: none;
      font-weight: 800;
      border-radius: 12px;
      text-transform: uppercase;
      font-size: 13px;
      transition: 0.3s;
    }
    .resume-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(122, 255, 208, 0.4); }

    .instruction {
      position: absolute; top: 30px; width: 100%; text-align: center;
      color: var(--accent2); font-family: monospace; letter-spacing: 3px;
      z-index: 5; pointer-events: none; opacity: 0.6; font-size: 11px;
    }

    .close-btn {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,0.1); border: none;
      color: var(--text); padding: 5px 12px; border-radius: 8px; cursor: pointer;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <div id="canvas-container"></div>
  <div class="instruction">SEQUENCE INITIATED // CLICK NUCLEOTIDE TO DECODE DATA</div>

  <div id="info-panel" class="hidden">
    <button class="close-btn" onclick="closePanel()">CLOSE [X]</button>
    <div id="panel-content"></div>
  </div>

  <script>
    let scene, camera, renderer, dnaGroup, raycaster, mouse;
    const infoPanel = document.getElementById('info-panel');
    const content = document.getElementById('panel-content');

    const dnaData = [
      {
        title: "01. GENOMIC IDENTITY",
        body: `
          <img src="Ashita_Photo.png" alt="Ashita Jawali">
          <p class="muted"><strong>Ashita Jawali</strong><br>Bioinformatician | Topeka, Kansas.<br><br>
          Bridging the gap between raw biological sequences and clinical insights through computational efficiency.</p>
        `
      },
      {
        title: "02. FULL CURRICULUM VITAE",
        body: `
          <p class="muted">Access the complete technical dossier including full academic records, publication details, and exhaustive project methodology.</p>
          <a href="AshitaJawali_CV.pdf" target="_blank" class="resume-btn">Download Resume (PDF)</a>
        `
      },
      {
        title: "03. PROFESSIONAL NODES",
        body: `
          <div class="muted">
            <strong>Bioinformatician @ KDHE</strong> (2024-Present)<br>
            Leading NGS pipeline design for pathogen surveillance.<br><br>
            <strong>Computational Biologist @ BitGenome</strong><br>
            Mentor for genomic data analysis pipelines.<br><br>
            <strong>Research Intern @ Carnegie Mellon</strong><br>
            Evolutionary mobile element investigation.
          </div>
        `
      },
      {
        title: "04. TECHNICAL STACK",
        body: `
          <span class="section-title">Computing</span>
          <p class="muted">Python, R, SQL, Bash, Linux, Git</p>
          <span class="section-title">Bioinformatics</span>
          <p class="muted">Nextflow, Docker, RNA-seq, Variant Calling, Molecular Docking, ADMET</p>
        `
      },
      {
        title: "05. ACADEMIC SEQUENCE",
        body: `
          <p class="muted">
            <strong>Master of Science (2023)</strong><br>Carnegie Mellon University<br>Quantitative Biology & Bioinformatics<br><br>
            <strong>Bachelor of Engineering (2022)</strong><br>B.M.S. College of Engineering<br>Biotechnology
          </p>
        `
      },
      {
        title: "06. RESEARCH & ABSTRACTS",
        body: `
          <p class="muted">
            • Detection of Nanoplastics (Asian Journal of Biotech, 2021)<br><br>
            • ISMB 2026 Abstract Submission (Functional Genomics)<br><br>
            • ISCB-UK 2026 Poster: Feature Selection in Lung Cancer.
          </p>
        `
      },
      {
        title: "07. PROJECT REPOSITORY",
        body: `
          <div class="muted">
            <strong>• NexTSS:</strong> Deep learning for TSS annotation.<br><br>
            <strong>• SARS-COV2:</strong> In-silico inhibitor screening.<br><br>
            <strong>• Biomarker Prediction:</strong> Multi-omics integration for oncology.
          </div>
        `
      }
    ];

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();
      dnaGroup = new THREE.Group();

      const numPoints = 14; 
      const twist = 0.5;
      const stepHeight = 1.1;

      for (let i = 0; i < numPoints; i++) {
        const sphereGeo = new THREE.SphereGeometry(0.38, 32, 32);
        const dataIndex = i % dnaData.length;

        // Strand 1
        const s1 = new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({ color: 0x7aa2ff, emissive: 0x0a1a33 }));
        s1.position.set(Math.cos(i * twist) * 4.5, i * stepHeight - 7, Math.sin(i * twist) * 4.5);
        s1.userData = dnaData[dataIndex]; 
        dnaGroup.add(s1);

        // Strand 2
        const s2 = new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({ color: 0x7affd0, emissive: 0x0a331a }));
        s2.position.set(Math.cos(i * twist + Math.PI) * 4.5, i * stepHeight - 7, Math.sin(i * twist + Math.PI) * 4.5);
        s2.userData = dnaData[dataIndex];
        dnaGroup.add(s2);

        // Connector
        const cylinder = new THREE.Mesh(
          new THREE.CylinderGeometry(0.04, 0.04, 9, 8),
          new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 })
        );
        cylinder.position.set(0, i * stepHeight - 7, 0);
        cylinder.rotation.z = Math.PI / 2;
        cylinder.rotation.y = -i * twist;
        dnaGroup.add(cylinder);
      }

      scene.add(dnaGroup);
      
      const pLight = new THREE.PointLight(0xffffff, 1.5, 100);
      pLight.position.set(10, 10, 10);
      scene.add(pLight);
      scene.add(new THREE.AmbientLight(0x404040));

      camera.position.z = 15;

      window.addEventListener('mousedown', (e) => {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(dnaGroup.children);
        if (intersects.length > 0) {
          const data = intersects[0].object.userData;
          if (data.title) {
            infoPanel.classList.remove('hidden');
            content.innerHTML = `<h2>${data.title}</h2>${data.body}`;
          }
        }
      });

      window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      });

      animate();
    }

    function closePanel() { infoPanel.classList.add('hidden'); }

    function animate() {
      requestAnimationFrame(animate);
      dnaGroup.rotation.y += 0.003;
      
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(dnaGroup.children);
      
      // Cursor logic
      const bacteriaSVG = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="%237affd0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/></svg>';
      document.body.style.cursor = intersects.length > 0 ? 'pointer' : `url('${bacteriaSVG}'), auto`;

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
