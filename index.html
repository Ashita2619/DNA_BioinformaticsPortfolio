<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ashita Jawali | Bio-Interactive Dossier</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  margin:0;
  background:#010205;
  color:white;
  font-family: monospace;
  overflow:hidden;
}

#click-prompt{
  position:fixed;
  bottom:40px;
  width:100%;
  text-align:center;
  color:#00ffaa;
  letter-spacing:3px;
  animation: blink 1.5s infinite;
}
@keyframes blink{50%{opacity:0.2}}

#info-panel{
  position:fixed;
  right:40px;
  top:50%;
  transform:translateY(-50%);
  width:520px;
  max-height:85vh;
  overflow:auto;
  background:rgba(0,0,0,0.95);
  border:1px solid #00ffaa;
  padding:30px;
  display:none;
}
h2{color:#00ffaa}
.tag{border:1px solid #5e9eff;padding:4px 8px;margin:4px;display:inline-block}
.btn{display:block;margin-top:10px;padding:10px;border:1px solid #333;text-decoration:none;color:white}
</style>
</head>

<body>

<div id="click-prompt">CLICK TO BOOT SYSTEM</div>

<div id="info-panel">
  <div id="content"></div>
</div>

<script>
let scene, camera, renderer;
let workspace, dna, rain;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let started = false;

/* ================= FULL PORTFOLIO DATA ================= */
const nodes = [

{
title:"ABOUT",
content:`
<p>Bioinformatician working at the intersection of multi-omics, machine learning, and drug discovery.</p>
<p>Analyzing large-scale genomic datasets, building reproducible pipelines, and enabling biomarker discovery.</p>

<a class="btn" href="https://github.com/Ashita2619" target="_blank">GitHub</a>
<a class="btn" href="https://www.linkedin.com/in/ashita-jawali-9a6872198/" target="_blank">LinkedIn</a>
<a class="btn" href="AshitaJawali_CV.pdf" target="_blank">CV</a>

<div>
<span class="tag">Bioinformatics</span>
<span class="tag">Multi-omics</span>
<span class="tag">Machine Learning</span>
<span class="tag">Drug Discovery</span>
<span class="tag">RNA-seq</span>
</div>
`
},

{
title:"PROJECTS",
content:`
<b>Lung Cancer Biomarkers</b>
<ul>
<li>RNA-seq preprocessing + ML modeling (F1: 0.85)</li>
<li>Pathway-level biological interpretation</li>
</ul>

<b>COVID Vaccine Modeling</b>
<ul>
<li>RF, XGBoost, SVM models</li>
<li>Socioeconomic trend analysis</li>
</ul>

<b>NexTSS</b>
<ul>
<li>Deep learning pipeline for TSS detection (PyTorch)</li>
</ul>
`
},

{
title:"EXPERIENCE",
content:`
<b>KDHE – Bioinformatician</b>
<ul>
<li>NGS pipelines for pathogen surveillance</li>
<li>Genome assembly + variant calling</li>
<li>Nextflow workflows</li>
</ul>

<b>BitGenome</b>
<ul>
<li>Mentoring in genome analysis + pipelines</li>
</ul>

<b>CMU TA</b>
<ul>
<li>Statistical programming</li>
</ul>
`
},

{
title:"PUBLICATIONS",
content:`
<b>Microplastics Detection (2021)</b>
<p>Published methodology for nanoplastic detection in environmental samples.</p>
`
},

{
title:"ABSTRACTS",
content:`
<ul>
<li>ISCB-UK 2026 Poster</li>
<li>ISMB 2026 Submission</li>
<li>ResearchHub Grant Proposal</li>
</ul>
`
},

{
title:"TECH STACK",
content:`
<span class="tag">Python</span>
<span class="tag">R</span>
<span class="tag">SQL</span>
<span class="tag">Nextflow</span>
<span class="tag">Docker</span>
<span class="tag">RNA-seq</span>
<span class="tag">Variant Calling</span>
`
}

];

/* ================= INIT ================= */
function init(){

scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.PointLight(0x00ffaa,2);
light.position.set(5,5,5);
scene.add(light);

/* ================= DESKTOP ================= */
workspace = new THREE.Group();

const desk = new THREE.Mesh(
  new THREE.BoxGeometry(10,0.3,5),
  new THREE.MeshPhongMaterial({color:0x050505})
);
desk.position.y = -2;

const monitor = new THREE.Mesh(
  new THREE.BoxGeometry(4,2.5,0.2),
  new THREE.MeshPhongMaterial({color:0x111111})
);

const screen = new THREE.Mesh(
  new THREE.PlaneGeometry(3.6,2.2),
  new THREE.MeshBasicMaterial({color:0x00ffaa, transparent:true, opacity:0.15})
);
screen.position.z = 0.11;

const chair = new THREE.Mesh(
  new THREE.BoxGeometry(1,1.5,1),
  new THREE.MeshPhongMaterial({color:0x080808})
);
chair.position.set(0,-1,2);

const person = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.4,1.2),
  new THREE.MeshPhongMaterial({color:0x000000})
);
person.position.set(0,-0.8,2.5);

workspace.add(desk,monitor,screen,chair,person);
scene.add(workspace);

/* ================= DNA ================= */
dna = new THREE.Group();
dna.visible = false;

for(let i=0;i<12;i++){
  let data = nodes[i % nodes.length];
  let angle = i*0.5;
  let y = i*1.5 - 8;

  let s1 = new THREE.Mesh(
    new THREE.SphereGeometry(0.3),
    new THREE.MeshPhongMaterial({color:0x5e9eff})
  );
  s1.position.set(Math.cos(angle)*3,y,Math.sin(angle)*3);
  s1.userData = data;

  let s2 = new THREE.Mesh(
    new THREE.SphereGeometry(0.3),
    new THREE.MeshPhongMaterial({color:0x00ffaa})
  );
  s2.position.set(Math.cos(angle+Math.PI)*3,y,Math.sin(angle+Math.PI)*3);
  s2.userData = data;

  let bond = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05,0.05,6),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.1})
  );
  bond.rotation.z = Math.PI/2;
  bond.rotation.y = -angle;
  bond.position.y = y;

  dna.add(s1,s2,bond);
}
scene.add(dna);

/* ================= BIO EMOJI RAIN ================= */
rain = new THREE.Group();
rain.visible = false;

const emojis = ['🦠','🧫','🧬','🧪','🍄','🔬'];

function texture(e){
  const c=document.createElement('canvas');
  c.width=128;c.height=128;
  const ctx=c.getContext('2d');
  ctx.font="80px Arial";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText(e,64,64);
  return new THREE.CanvasTexture(c);
}

emojis.forEach(e=>{
  const tex = texture(e);
  for(let i=0;i<10;i++){
    let s = new THREE.Sprite(new THREE.SpriteMaterial({
      map:tex,transparent:true,opacity:0.35
    }));
    s.position.set(Math.random()*40-20,Math.random()*40-20,Math.random()*20-10);
    s.scale.set(1.2,1.2,1.2);
    s.userData.speed = 0.01 + Math.random()*0.03;
    rain.add(s);
  }
});
scene.add(rain);

/* CAMERA */
camera.position.z = 8;

/* EVENTS */
window.addEventListener("click",handleClick);
window.addEventListener("mousemove",e=>{
mouse.x=(e.clientX/innerWidth)*2-1;
mouse.y=-(e.clientY/innerHeight)*2+1;
});

animate();
}

/* ================= CLICK ================= */
function handleClick(){

if(!started){
  started=true;
  document.getElementById("click-prompt").style.display="none";

  gsap.to(camera.position,{
    z:1,
    duration:2,
    onComplete:()=>{
      workspace.visible=false;
      dna.visible=true;
      rain.visible=true;
      gsap.to(camera.position,{z:15,duration:1.5});
    }
  });

}else{
  raycaster.setFromCamera(mouse,camera);
  let hits = raycaster.intersectObjects(dna.children);

  if(hits.length){
    let d = hits[0].object.userData;
    if(!d) return;

    document.getElementById("info-panel").style.display="block";
    document.getElementById("content").innerHTML =
      `<h2>${d.title}</h2>${d.content}`;
  }
}
}

/* ================= ANIMATE ================= */
function animate(){
requestAnimationFrame(animate);

if(dna.visible){
  dna.rotation.y += 0.003;

  rain.children.forEach(p=>{
    p.position.y -= p.userData.speed;
    if(p.position.y < -20) p.position.y = 20;
  });
}

renderer.render(scene,camera);
}

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

init();
</script>
</body>
</html>
