<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ashita Jawali | Bio-Interactive Dossier</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  margin: 0;
  background: #010205;
  color: white;
  font-family: monospace;
  overflow: hidden;
  cursor: crosshair;
}

#click-prompt {
  position: fixed;
  bottom: 40px;
  width: 100%;
  text-align: center;
  color: #00ffaa;
  letter-spacing: 3px;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%,100% {opacity:1;}
  50% {opacity:0.2;}
}

#info-panel {
  position: fixed;
  right: 30px;
  top: 50%;
  transform: translateY(-50%);
  width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  background: rgba(2,6,12,0.98);
  border: 1px solid #00ffaa;
  padding: 30px;
  display: none;
  z-index: 10;
}

h2 { color:#00ffaa; }
.text { color:#cbd5e1; font-size:13px; line-height:1.6; }
.tag { border:1px solid #5e9eff; padding:2px 6px; margin:3px; display:inline-block; }
.btn { display:block; margin-top:10px; border:1px solid #444; padding:8px; text-align:center; color:white; text-decoration:none; }
.btn:hover { background:#00ffaa; color:black; }

.close-btn {
  float:right;
  cursor:pointer;
  color:red;
}
</style>
</head>

<body>

<div id="click-prompt">CLICK TO BOOT SYSTEM</div>

<div id="info-panel">
  <span class="close-btn" onclick="closePanel()">[ CLOSE ]</span>
  <div id="content"></div>
</div>

<script>
let scene, camera, renderer;
let workspace, dna, rain;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let started = false;

/* ================= CONTENT ================= */
const data = [
{
title:"ABOUT",
content:`<p class="text">Bioinformatician working at the intersection of multi-omics, ML, and drug discovery.</p>`
},
{
title:"PROJECTS",
content:`<p class="text"><b>Lung Cancer Biomarkers</b> – ML + RNA-seq analysis</p>`
},
{
title:"EXPERIENCE",
content:`<p class="text"><b>KDHE</b> – NGS pipelines, pathogen surveillance</p>`
},
{
title:"SKILLS",
content:`<div>
<span class="tag">Python</span>
<span class="tag">R</span>
<span class="tag">Nextflow</span>
<span class="tag">RNA-seq</span>
</div>`
}
];

/* ================= INIT ================= */
function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 8;

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  /* ===== WORKSPACE ===== */
  workspace = new THREE.Group();

  const desk = new THREE.Mesh(
    new THREE.BoxGeometry(10,0.3,5),
    new THREE.MeshPhongMaterial({color:0x050505})
  );
  desk.position.y = -2;

  const monitor = new THREE.Mesh(
    new THREE.BoxGeometry(4,2.5,0.2),
    new THREE.MeshPhongMaterial({color:0x111111})
  );

  const screen = new THREE.Mesh(
    new THREE.PlaneGeometry(3.5,2),
    new THREE.MeshBasicMaterial({color:0x00ffaa, transparent:true, opacity:0.2})
  );
  screen.position.z = 0.11;

  /* PERSON (FIXED — no CapsuleGeometry) */
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4,0.4,1.5,32),
    new THREE.MeshPhongMaterial({color:0x000000})
  );
  body.position.set(0,-1,2.5);

  workspace.add(desk, monitor, screen, body);
  scene.add(workspace);

  /* ===== DNA ===== */
  dna = new THREE.Group();
  dna.visible = false;

  for(let i=0;i<12;i++){
    const item = data[i % data.length];
    const angle = i * 0.5;
    const y = i * 1.5 - 8;

    const s1 = new THREE.Mesh(
      new THREE.SphereGeometry(0.3,32,32),
      new THREE.MeshPhongMaterial({color:0x00ffaa})
    );
    s1.position.set(Math.cos(angle)*4, y, Math.sin(angle)*4);
    s1.userData = item;

    const s2 = new THREE.Mesh(
      new THREE.SphereGeometry(0.3,32,32),
      new THREE.MeshPhongMaterial({color:0x5e9eff})
    );
    s2.position.set(Math.cos(angle+Math.PI)*4, y, Math.sin(angle+Math.PI)*4);
    s2.userData = item;

    dna.add(s1, s2);
  }
  scene.add(dna);

  /* ===== PATHOGEN RAIN ===== */
  rain = new THREE.Group();
  rain.visible = false;

  const emojis = ["🦠","🧫","🍄"];

  emojis.forEach(e=>{
    const canvas = document.createElement("canvas");
    canvas.width = 64;
    canvas.height = 64;

    const ctx = canvas.getContext("2d");
    ctx.font = "32px Arial";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(e,32,32);

    const tex = new THREE.CanvasTexture(canvas);

    for(let i=0;i<20;i++){
      const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({map:tex, transparent:true})
      );
      sprite.position.set(
        Math.random()*20-10,
        Math.random()*20-10,
        Math.random()*20-10
      );
      sprite.userData.speed = 0.02 + Math.random()*0.02;
      rain.add(sprite);
    }
  });

  scene.add(rain);

  /* LIGHT */
  scene.add(new THREE.AmbientLight(0xffffff,1.5));

  window.addEventListener("click", onClick);
  window.addEventListener("mousemove", e=>{
    mouse.x = (e.clientX/window.innerWidth)*2-1;
    mouse.y = -(e.clientY/window.innerHeight)*2+1;
  });

  animate();
}

/* ================= CLICK ================= */
function onClick(){

  if(!started){
    started = true;
    document.getElementById("click-prompt").style.display="none";

    gsap.to(camera.position,{
      z:1,
      duration:2,
      onComplete:()=>{
        workspace.visible=false;
        dna.visible=true;
        rain.visible=true;

        gsap.to(camera.position,{z:18,duration:1});
      }
    });

  } else {
    raycaster.setFromCamera(mouse,camera);
    const hits = raycaster.intersectObjects(dna.children);

    if(hits.length){
      const d = hits[0].object.userData;
      document.getElementById("info-panel").style.display="block";
      document.getElementById("content").innerHTML =
        `<h2>${d.title}</h2>${d.content}`;
    }
  }
}

function closePanel(){
  document.getElementById("info-panel").style.display="none";
}

/* ================= ANIMATE ================= */
function animate(){
  requestAnimationFrame(animate);

  if(dna.visible){
    dna.rotation.y += 0.003;

    rain.children.forEach(p=>{
      p.position.y -= p.userData.speed;
      if(p.position.y < -10) p.position.y = 10;
    });
  }

  renderer.render(scene,camera);
}

init();
</script>

</body>
</html>
