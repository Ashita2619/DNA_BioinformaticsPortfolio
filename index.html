<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bio Lab Portfolio System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #05060a;
  font-family: monospace;
  cursor: crosshair;
}

/* PANEL */
#panel {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 420px;
  max-height: 80vh;
  overflow-y: auto;
  background: rgba(0,0,0,0.92);
  border: 1px solid #00ffaa;
  color: white;
  padding: 18px;
  display: none;
  z-index: 10;
}

h2 { color:#00ffaa; }

#boot {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 50%;
  color: #00ffaa;
  letter-spacing: 2px;
  z-index: 20;
}

.btn {
  display:inline-block;
  padding:6px 10px;
  border:1px solid #00ffaa;
  color:#00ffaa;
  text-decoration:none;
  margin-right:5px;
}
.btn:hover { background:#00ffaa; color:black; }
</style>
</head>

<body>

<div id="boot">CLICK TO INITIALIZE BIO LAB SYSTEM</div>
<div id="panel"></div>

<script>

/* =========================
   GLOBALS
========================= */
let scene, camera, renderer;
let workspace, dnaGroup, rainGroup;
let started = false;

let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

/* =========================
   FULL CONTENT (CODE 2)
========================= */
const nodes = [
{
title: "ABOUT",
html: `
<img src="Ashita_Photo.png" style="width:100%;border-radius:10px;border:2px solid #00ffaa;margin-bottom:10px;" />

<p><b>Bioinformatician | Multi-omics | AI/ML | Drug Discovery</b></p>

<div style="margin-top:10px;">
<a href="AshitaJawali_CV.pdf" class="btn">CV</a>
<a href="https://github.com/Ashita2619" class="btn">GitHub</a>
<a href="https://linkedin.com" class="btn">LinkedIn</a>
</div>
`
},
{
title: "PROJECTS",
html: `
<b>Lung Cancer Biomarker Prediction</b><br>
RNA-seq + ML feature selection (F1 0.85)<br><br>

<b>COVID Vaccine Study</b><br>
Random Forest / XGBoost / SVM<br><br>

<b>NexTSS Pipeline</b><br>
PyTorch deep learning TSS detection<br><br>

<b>Diabetes Prediction Model</b><br>
82% accuracy ML model<br><br>

<b>SARS-CoV2 Docking</b><br>
In-silico drug screening`
},
{
title: "EXPERIENCE",
html: `
<b>KDHE Bioinformatician</b><br>
Nextflow pathogen pipelines<br><br>

<b>BitGenome Mentor</b><br>
Computational biology teaching<br><br>

<b>CMU TA</b><br>
Bioinformatics + stats teaching<br><br>

<b>Hiller Lab CMU</b><br>
Comparative genomics research<br><br>

<b>IQVIA</b><br>
Clinical data analytics`
},
{
title: "PUBLICATIONS",
html: `
Micro & Nanoplastics Detection Review (2021)`
},
{
title: "ABSTRACTS",
html: `
ISCB-UK 2026 Poster<br>
ISMB 2026 Submission<br>
Research Hub Grant`
},
{
title: "SKILLS",
html: `
Python, R, SQL, Nextflow, Docker<br>
RNA-seq, ML, PyTorch, Variant Calling`
},
{
title: "EDUCATION",
html: `
Carnegie Mellon University (MS)<br>
BMS College of Engineering (BE)`
},
{
title: "MEMBERSHIP",
html: `ISCB (International Society for Computational Biology)`
}
];

/* =========================
   INIT
========================= */
init();

function init(){

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
60, innerWidth/innerHeight, 0.1, 1000
);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
let light = new THREE.PointLight(0x00ffaa, 1.5);
light.position.set(5,5,5);
scene.add(light);

/* =========================
   DESKTOP SCENE (FIXED)
========================= */
workspace = new THREE.Group();

let desk = new THREE.Mesh(
new THREE.BoxGeometry(10,0.3,5),
new THREE.MeshStandardMaterial({color:0x111111})
);

let chair = new THREE.Mesh(
new THREE.CylinderGeometry(0.6,0.6,1.5),
new THREE.MeshStandardMaterial({color:0x222222})
);
chair.position.set(0,-1.2,2);

let monitor = new THREE.Mesh(
new THREE.BoxGeometry(4,2.5,0.2),
new THREE.MeshStandardMaterial({color:0x000000})
);

let screen = new THREE.Mesh(
new THREE.PlaneGeometry(3.8,2.2),
new THREE.MeshBasicMaterial({color:0x00ffaa,transparent:true,opacity:0.3})
);

screen.position.z = 0.11;
monitor.add(screen);

workspace.add(desk, chair, monitor);
scene.add(workspace);

/* =========================
   DNA HELIX (WITH BONDS)
========================= */
dnaGroup = new THREE.Group();
dnaGroup.visible = false;

for(let i=0;i<40;i++){

let y = i*0.3 - 6;
let a = i*0.45;

let p1 = sphere(0x00ffaa);
let p2 = sphere(0x5e9eff);

p1.position.set(Math.cos(a)*1.6, y, Math.sin(a)*1.6);
p2.position.set(Math.cos(a+Math.PI)*1.6, y, Math.sin(a+Math.PI)*1.6);

let bond = new THREE.Line(
new THREE.BufferGeometry().setFromPoints([p1.position,p2.position]),
new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.25})
);

dnaGroup.add(p1,p2,bond);
}

scene.add(dnaGroup);

/* =========================
   PATHOGEN RAIN (SMALL + CONTROLLED)
========================= */
rainGroup = new THREE.Group();
rainGroup.visible = false;

const emojis = ["🦠","🧫","🍄","🔬","⚗️"];

for(let i=0;i<80;i++){

let tex = emoji(emojis[Math.floor(Math.random()*emojis.length)]);

let s = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));

s.position.set(
Math.random()*18-9,
Math.random()*12+2,
Math.random()*6-3
);

s.scale.set(0.2,0.2,0.2);
s.userData.speed = 0.01 + Math.random()*0.01;

rainGroup.add(s);
}

scene.add(rainGroup);

camera.position.z = 8;

/* EVENTS */
window.addEventListener("click",onClick);
window.addEventListener("mousemove",e=>{
mouse.x = (e.clientX/innerWidth)*2-1;
mouse.y = -(e.clientY/innerHeight)*2+1;
});

animate();
}

/* =========================
   CLICK FLOW
========================= */
function onClick(){

if(!started){

gsap.to(camera.position,{
z:2,
duration:2,
onComplete:()=>{
workspace.visible=false;
dnaGroup.visible=true;
rainGroup.visible=true;
gsap.to(camera.position,{z:10,duration:1.5});
}
});

document.getElementById("boot").style.display="none";
started=true;

}else{

raycaster.setFromCamera(mouse,camera);

let hit = raycaster.intersectObjects(dnaGroup.children);

if(hit.length){

let panel = document.getElementById("panel");
panel.style.display = "block";

let index = Math.floor(Math.random()*nodes.length);
panel.innerHTML = nodes[index].html;
}
}
}

/* =========================
   HELPERS
========================= */
function sphere(color){
return new THREE.Mesh(
new THREE.SphereGeometry(0.12,16,16),
new THREE.MeshStandardMaterial({color})
);
}

function emoji(e){
let c=document.createElement("canvas");
c.width=64;c.height=64;
let ctx=c.getContext("2d");
ctx.font="32px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(e,32,32);
return new THREE.CanvasTexture(c);
}

/* =========================
   LOOP
========================= */
function animate(){

requestAnimationFrame(animate);

/* rain */
if(rainGroup.visible){
rainGroup.children.forEach(r=>{
r.position.y -= r.userData.speed;
if(r.position.y < -5) r.position.y = 10;
});
}

/* dna rotation */
dnaGroup.rotation.y += 0.002;

renderer.render(scene,camera);
}

</script>

</body>
</html>
