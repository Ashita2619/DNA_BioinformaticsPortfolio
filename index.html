<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ashita Jawali | Bioinformatics Portfolio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    :root {
      --bg: #02050a;
      --panel: rgba(5, 10, 20, 0.98);
      --accent: #7aa2ff;
      --accent2: #7affd0;
      --text: #e9eefc;
    }

    body { 
      margin: 0; background: var(--bg); color: var(--text); 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      overflow: hidden;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" style="font-size:24px"><text y="24">🦠</text></svg>'), auto;
    }

    body.dna-active {
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" style="font-size:24px"><text y="24">🧬</text></svg>'), pointer !important;
    }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 100;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01));
      background-size: 100% 2px, 3px 100%;
    }

    #click-prompt {
      position: fixed; bottom: 15%; left: 50%; transform: translateX(-50%);
      z-index: 200; text-align: center; color: var(--accent2);
      font-family: 'Courier New', monospace; letter-spacing: 4px; font-size: 14px;
      text-shadow: 0 0 10px var(--accent2); animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    #info-panel {
      position: absolute; right: 50px; top: 50%; transform: translateY(-50%);
      width: 500px; max-height: 85vh; overflow-y: auto;
      background: var(--panel); border: 1px solid rgba(122, 255, 208, 0.2);
      border-radius: 20px; padding: 40px; z-index: 300;
      box-shadow: 0 0 50px rgba(0,0,0,0.8); backdrop-filter: blur(20px);
    }

    .hidden { display: none; opacity: 0; }
    
    h2 { font-family: 'Courier New', monospace; color: var(--accent2); font-size: 24px; margin-top: 0; border-bottom: 1px solid rgba(122, 255, 208, 0.1); padding-bottom: 15px; text-transform: uppercase; }
    .section-title { color: var(--accent); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-top: 25px; display: block; }
    .content-text { font-size: 15px; line-height: 1.6; color: #b7c3e6; margin: 10px 0; }
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn { padding: 12px; flex: 1; border-radius: 8px; text-decoration: none; font-size: 11px; font-weight: 700; text-align: center; text-transform: uppercase; transition: 0.3s; }
    .btn-gh { background: #24292e; color: white; border: 1px solid #444; }
    .btn-li { background: #0077b5; color: white; }
    .btn-cv { background: var(--accent2); color: #02050a; width: 100%; display: block; margin-top: 20px; }
    .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid #334; color: #667; cursor: pointer; padding: 5px 10px; border-radius: 5px; }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--accent2); }
  </style>
</head>

<body>
  <div id="overlay"></div>
  <div id="click-prompt">SEQUENCE FOUND: ASHITA_JAWALI.DNA <br> [ CLICK MONITOR TO ANALYZE ]</div>
  
  <div id="info-panel" class="hidden">
    <button class="close-btn" onclick="closePanel()">ESC [X]</button>
    <div id="panel-content"></div>
  </div>

  <script>
    let scene, camera, renderer, dnaGroup, pathogenGroup, roomGroup, screen;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let isTransitioned = false;

    // ACTUAL CONTENT FROM YOUR PORTFOLIO
    const portfolioData = [
      { 
        id: "BIO", 
        title: "SYSTEM USER: ASHITA JAWALI", 
        body: `
          <img src="Ashita_Photo.png" style="width:100px; border-radius:12px; border:2px solid var(--accent); margin-bottom:15px;">
          <p class="content-text"><strong>Bioinformatician | MS Quantitative Biology @ CMU</strong></p>
          <p class="content-text">Passionate about bridging the gap between raw sequencing data and clinical applications. Currently working on NGS pipelines for public health surveillance.</p>
          <div class="btn-row">
            <a href="https://github.com/Ashita2619" class="btn btn-gh" target="_blank">GitHub</a>
            <a href="https://linkedin.com/in/ashitajawali" class="btn btn-li" target="_blank">LinkedIn</a>
          </div>
        ` 
      },
      { 
        id: "EDUCATION", 
        title: "ACADEMIC BACKGROUND", 
        body: `
          <span class="section-title">Carnegie Mellon University</span>
          <p class="content-text">MS in Quantitative Biology & Bioinformatics (2022-2023). Capstone: Computational modeling of cell signaling.</p>
          <span class="section-title">B.M.S. College of Engineering</span>
          <p class="content-text">BE in Biotechnology (2018-2022).<br>CGPA: 8.56 / 10.0</p>
          <span class="section-title">Honors</span>
          <p class="content-text">Research Hub Grantee (2025-2026 Cycle).</p>
        ` 
      },
      { 
        id: "PROJECTS", 
        title: "RESEARCH & PROJECTS", 
        body: `
          <span class="section-title">Lung Cancer Biomarker Identification</span>
          <p class="content-text">Used mRMR feature selection & ML models on TCGA data. Achieved 0.85 F1-score in identifying novel markers.</p>
          <span class="section-title">NexTSS Pipeline</span>
          <p class="content-text">A PyTorch-based Deep Learning tool for Transcription Start Site annotation in non-model organisms.</p>
          <span class="section-title">Nanoplastics Detection</span>
          <p class="content-text">Published research on detection methods for micro/nanoplastics in environmental water samples.</p>
        ` 
      },
      { 
        id: "EXPERIENCE", 
        title: "EXPERIENCE LOG", 
        body: `
          <span class="section-title">KDHE - Topeka, KS</span>
          <p class="content-text">Bioinformatician. Implementing Nextflow pipelines for viral & bacterial pathogen surveillance.</p>
          <span class="section-title">BitGenome</span>
          <p class="content-text">Computational Biology Mentor. Training the next generation of genomic researchers.</p>
        ` 
      },
      { 
        id: "SKILLS", 
        title: "TECHNICAL STACK", 
        body: `
          <span class="section-title">Programming</span>
          <p class="content-text">Python (Biopython, PyTorch, Scikit-learn), R (Bioconductor), SQL, Bash.</p>
          <span class="section-title">Tools & Workflows</span>
          <p class="content-text">Nextflow, Docker, Git, RNA-Seq, Variant Calling, Molecular Docking (AutoDock Vina).</p>
        ` 
      },
      { 
        id: "RESUME", 
        title: "DOCUMENTATION", 
        body: `
          <span class="section-title">FULL CV</span>
          <p class="content-text">Verified technical dossier and publication records.</p>
          <a href="AshitaJawali_CV.pdf" target="_blank" class="btn btn-cv">Download Full Resume (PDF)</a>
        ` 
      }
    ];

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // --- SCENE 1: THE ANALYST SETUP ---
      roomGroup = new THREE.Group();
      
      const desk = new THREE.Mesh(new THREE.BoxGeometry(6, 0.2, 3), new THREE.MeshPhongMaterial({color: 0x111111}));
      desk.position.set(0, -1.5, -2);
      
      const monBase = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1, 0.1), new THREE.MeshPhongMaterial({color: 0x222222}));
      monBase.position.set(0, -0.5, -2.5);
      
      const monitor = new THREE.Mesh(new THREE.BoxGeometry(4, 2.5, 0.1), new THREE.MeshPhongMaterial({color: 0x050505}));
      monitor.position.set(0, 0.5, -2.5);
      
      screen = new THREE.Mesh(new THREE.PlaneGeometry(3.8, 2.3), new THREE.MeshBasicMaterial({color: 0x7affd0, transparent: true, opacity: 0.2}));
      screen.position.set(0, 0.5, -2.44);
      
      const personHead = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshPhongMaterial({color: 0x000000}));
      personHead.position.set(0, 0.2, -0.5);
      
      roomGroup.add(desk, monBase, monitor, screen, personHead);
      scene.add(roomGroup);

      // --- SCENE 2: THE DNA INTERFACE ---
      dnaGroup = new THREE.Group();
      dnaGroup.visible = false;
      const twist = 0.5;
      for (let i = 0; i < 12; i++) {
        const item = portfolioData[i % portfolioData.length];
        const y = i * 1.6 - 8;
        const ang = i * twist;

        const s1 = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshPhongMaterial({color: 0x7aa2ff, emissive: 0x112244}));
        s1.position.set(Math.cos(ang)*4, y, Math.sin(ang)*4);
        s1.userData = item;

        const s2 = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshPhongMaterial({color: 0x7affd0, emissive: 0x114422}));
        s2.position.set(Math.cos(ang + Math.PI)*4, y, Math.sin(ang + Math.PI)*4);
        s2.userData = item;

        // Base-pair connections (A--G style bars)
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 8), new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.1}));
        bar.rotation.z = Math.PI/2;
        bar.rotation.y = -ang;
        bar.position.y = y;

        dnaGroup.add(s1, s2, bar);
      }
      scene.add(dnaGroup);

      // --- PATHOGEN RAIN ---
      pathogenGroup = new THREE.Group();
      pathogenGroup.visible = false;
      const microbes = ['🦠', '🔬', '🧬', '🧪', '🧫', '🍄'];
      microbes.forEach(m => {
        const can = document.createElement('canvas'); can.width=64; can.height=64;
        const ctx = can.getContext('2d'); ctx.font='32px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(m, 32, 32);
        const tex = new THREE.CanvasTexture(can);
        for(let i=0; i<15; i++) {
          const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: tex, transparent:true, opacity:0.4}));
          sprite.position.set(Math.random()<0.5 ? -15-Math.random()*10 : 15+Math.random()*10, Math.random()*40-20, Math.random()*20-10);
          sprite.userData = { speed: 0.01 + Math.random()*0.025 };
          pathogenGroup.add(sprite);
        }
      });
      scene.add(pathogenGroup);

      const light = new THREE.PointLight(0xffffff, 1.5, 100); light.position.set(5, 5, 5); scene.add(light);
      scene.add(new THREE.AmbientLight(0x202020));
      camera.position.z = 5;

      window.addEventListener('mousedown', onDown);
      window.addEventListener('mousemove', onMove);
      animate();
    }

    function onDown() {
      if(!isTransitioned) {
        isTransitioned = true;
        document.getElementById('click-prompt').style.display = 'none';
        // Zoom into screen
        gsap.to(camera.position, { z: -2.3, duration: 1.5, ease: "power2.in", onComplete: () => {
          roomGroup.visible = false;
          dnaGroup.visible = true;
          pathogenGroup.visible = true;
          gsap.to(camera.position, { z: 18, duration: 1, ease: "power2.out" });
        }});
      } else {
        raycaster.setFromCamera(mouse, camera);
        const hit = raycaster.intersectObjects(dnaGroup.children).find(h => h.object.userData.id);
        if(hit) {
          const panel = document.getElementById('info-panel');
          panel.classList.remove('hidden');
          gsap.fromTo(panel, {opacity: 0, x: 100}, {opacity: 1, x: 0, duration: 0.5});
          document.getElementById('panel-content').innerHTML = `<h2>${hit.object.userData.title}</h2>${hit.object.userData.body}`;
        }
      }
    }

    function onMove(e) {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    }

    function closePanel() { 
      gsap.to('#info-panel', {opacity: 0, duration: 0.3, onComplete: () => document.getElementById('info-panel').classList.add('hidden')});
    }

    function animate() {
      requestAnimationFrame(animate);
      if(dnaGroup.visible) {
        dnaGroup.rotation.y += 0.002;
        pathogenGroup.children.forEach(p => { p.position.y -= p.userData.speed; if(p.position.y < -20) p.position.y = 20; });
        
        // Anti-lag Raycaster: only check every other frame if needed, but ThreeJS r128 is efficient enough
        raycaster.setFromCamera(mouse, camera);
        const hovered = raycaster.intersectObjects(dnaGroup.children).some(h => h.object.userData.id);
        document.body.classList.toggle('dna-active', hovered);
      } else {
        screen.material.opacity = 0.2 + Math.sin(Date.now()*0.003)*0.1;
      }
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
