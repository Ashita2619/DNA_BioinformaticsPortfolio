<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ashita Jawali | Interactive Bio-Terminal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root {
      --bg: #05080a;
      --panel: rgba(10, 20, 30, 0.85);
      --accent: #7aa2ff;
      --accent2: #7affd0;
      --text: #e9eefc;
    }

    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; }

    #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

    /* The Content Panel */
    #info-panel {
      position: absolute;
      left: 50px;
      top: 50%;
      transform: translateY(-50%);
      width: 400px;
      background: var(--panel);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(122, 255, 208, 0.3);
      border-radius: 20px;
      padding: 30px;
      z-index: 10;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .hidden { opacity: 0; transform: translateY(-30%) scale(0.9); pointer-events: none; }

    #panel-content img {
      width: 120px; height: 120px; border-radius: 60px; 
      border: 3px solid var(--accent2); margin-bottom: 20px;
    }

    .instruction {
      position: absolute; bottom: 30px; width: 100%; text-align: center;
      color: var(--accent2); font-family: monospace; letter-spacing: 2px;
      z-index: 5; pointer-events: none; animation: pulse 2s infinite;
    }

    h2 { color: var(--accent2); margin-top: 0; text-transform: uppercase; }
    .data-label { color: var(--accent); font-weight: bold; font-family: monospace; }
    
    @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
  </style>
</head>

<body>
  <div id="canvas-container"></div>
  
  <div class="instruction">CLICK NUCLEOTIDES TO SEQUENCE DATA</div>

  <div id="info-panel" class="hidden">
    <div id="panel-content">
      <!-- Dynamic content injected here -->
    </div>
    <button onclick="closePanel()" style="margin-top:20px; background:none; border:1px solid var(--accent); color:var(--accent); cursor:pointer; padding:5px 10px; border-radius:5px;">[ CLOSE ]</button>
  </div>

  <script>
    let scene, camera, renderer, dnaGroup, raycaster, mouse;
    const infoPanel = document.getElementById('info-panel');
    const content = document.getElementById('panel-content');

    // Content Mapping for the DNA Nodes
    const dnaData = [
      {
        type: "PROFILE",
        title: "Ashita Jawali",
        body: `<img src="Ashita_Photo.png" alt="Ashita"><br><span class="data-label">BIO:</span> Bioinformatician specializing in Multi-omics and AI/ML for drug discovery. Currently at KDHE.`
      },
      {
        type: "SKILLS",
        title: "Technical Stack",
        body: `<span class="data-label">LANGUAGES:</span> Python, R, SQL, Bash<br><br><span class="data-label">TOOLS:</span> Nextflow, Docker, Git, Linux<br><br><span class="data-label">METHODS:</span> RNA-seq, Variant Calling, ML`
      },
      {
        type: "EXPERIENCE",
        title: "Professional Path",
        body: `<span class="data-label">CURRENT:</span> Bioinformatician @ KDHE<br><br><span class="data-label">PREVIOUS:</span> Computational Biologist @ BitGenome, Graduate Intern @ Carnegie Mellon.`
      },
      {
        type: "EDUCATION",
        title: "Academic Background",
        body: `<span class="data-label">MS:</span> Carnegie Mellon University (2023)<br><br><span class="data-label">BE:</span> B.M.S. College of Engineering (2022)`
      }
    ];

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();
      dnaGroup = new THREE.Group();

      const numPoints = 12; // Fewer points to make clicking easier
      const twist = 0.6;
      const stepHeight = 1.2;

      for (let i = 0; i < numPoints; i++) {
        const sphereGeo = new THREE.SphereGeometry(0.4, 32, 32);
        
        // Nucleotide 1
        const s1 = new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({ color: 0x7aa2ff, emissive: 0x224488 }));
        s1.position.set(Math.cos(i * twist) * 4, i * stepHeight - (numPoints/2), Math.sin(i * twist) * 4);
        s1.userData = dnaData[i % dnaData.length]; // Attach data
        dnaGroup.add(s1);

        // Nucleotide 2
        const s2 = new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({ color: 0x7affd0, emissive: 0x228866 }));
        s2.position.set(Math.cos(i * twist + Math.PI) * 4, i * stepHeight - (numPoints/2), Math.sin(i * twist + Math.PI) * 4);
        s2.userData = dnaData[(i + 1) % dnaData.length];
        dnaGroup.add(s2);

        // Connector
        const cylinder = new THREE.Mesh(
          new THREE.CylinderGeometry(0.05, 0.05, 8, 8),
          new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 })
        );
        cylinder.position.set(0, i * stepHeight - (numPoints/2), 0);
        cylinder.rotation.z = Math.PI / 2;
        cylinder.rotation.y = -i * twist;
        dnaGroup.add(cylinder);
      }

      scene.add(dnaGroup);
      
      const light = new THREE.PointLight(0xffffff, 1.5, 100);
      light.position.set(10, 10, 10);
      scene.add(light);
      scene.add(new THREE.AmbientLight(0x404040));

      camera.position.z = 15;

      window.addEventListener('mousedown', onDocumentMouseDown);
      window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      });

      animate();
    }

    function onDocumentMouseDown(event) {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(dnaGroup.children);

      if (intersects.length > 0) {
        const data = intersects[0].object.userData;
        if (data.title) {
          showPanel(data);
        }
      }
    }

    function showPanel(data) {
      infoPanel.classList.remove('hidden');
      content.innerHTML = `<h2>${data.title}</h2><p>${data.body}</p>`;
    }

    function closePanel() {
      infoPanel.classList.add('hidden');
    }

    function animate() {
      requestAnimationFrame(animate);
      dnaGroup.rotation.y += 0.005;
      
      // Hover highlight logic
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(dnaGroup.children);
      document.body.style.cursor = intersects.length > 0 ? 'pointer' : 'default';

      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
