<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bio Lab Portfolio System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #070b14, #02030a);
  font-family: monospace;

  cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="24">🦠</text></svg>'), auto;
}

body.dna {
  cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="24">🧬</text></svg>'), pointer !important;
}

#panel {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 420px;
  max-height: 80vh;
  overflow-y: auto;
  background: rgba(0,0,0,0.92);
  border: 1px solid #00ffaa;
  color: white;
  padding: 18px;
  display: none;
  z-index: 10;
}

#boot {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 40%;
  color: #00ffaa;
  z-index: 20;
}

#terminal {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: #00ffaa;
  font-size: 12px;
  opacity: 0.8;
}

h2 { color:#00ffaa; }

.btn {
  display:inline-block;
  padding:6px 10px;
  border:1px solid #00ffaa;
  color:#00ffaa;
  text-decoration:none;
  margin-right:5px;
}
.btn:hover { background:#00ffaa; color:black; }
</style>
</head>

<body>

<div id="boot">INITIALIZING BIO-LAB SYSTEM...</div>
<div id="terminal"></div>
<div id="panel"></div>

<script>

let scene, camera, renderer;
let workspace, dnaGroup, rainGroup;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

let started = false;
let hoveringDNA = false;

/* =========================
   SOUND + TERMINAL
========================= */
let audioCtx;
function initSound(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 55;
  gain.gain.value = 0.03;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
}

const terminalLines = [
"Booting Bio-Lab Kernel...",
"Loading genome engine...",
"Initializing DNA helices...",
"Starting pathogen simulation...",
"System Ready."
];

let tIndex = 0;
function typeTerminal(){
  if(tIndex >= terminalLines.length) return;
  document.getElementById("terminal").innerHTML += terminalLines[tIndex] + "<br>";
  tIndex++;
  setTimeout(typeTerminal, 800);
}

/* =========================
   YOUR EXACT DATA (FIXED STRUCTURE)
========================= */
const dnaData = [

{
title: "USER: ASHITA JAWALI",
color: 0x00ffaa,
body: `
<img src="Ashita_Photo.png" style="width:70%;border-radius:10px;border:2px solid #00ffaa;margin-bottom:10px;">

<p><b>Bioinformatician</b><br>Topeka, Kansas, USA</p>

<div style="margin-top:10px;">
<a href="https://github.com/Ashita2619" class="btn">GitHub</a>
<a href="https://www.linkedin.com/in/ashita-jawali-9a6872198/" class="btn">LinkedIn</a>
<a href="AshitaJawali_CV.pdf" class="btn">CV</a>
</div>

<p class="muted">
Bioinformatician working at the intersection of multi-omics, machine learning, and drug discovery. My work focuses on genomic and transcriptomic analysis and biomarker discovery.
</p>
<p style="margin-top:10px;">ashita.bt18@bmsce.ac.in</p>
`
},

{
title: "RESEARCH PROJECTS",
color: 0x4da3ff,
body: `
<b>Lung Cancer Biomarker Prediction</b><br>
RNA-seq + ML feature selection (F1 0.85)<br><br>

<b>COVID Vaccine Study</b><br>
Random Forest, XGBoost, SVM<br><br>

<b>NexTSS Pipeline</b><br>
PyTorch deep learning TSS detection<br><br>

<b>Diabetes Prediction Model</b><br>
Random Forest (82.1%)<br><br>

<b>SARS-CoV2 Docking</b><br>
In-silico molecular screening
`
},

{
title: "EXPERIENCE LOG",
color: 0xa855f7,
body: `
<b>KDHE Bioinformatician (2024–Present)</b><br>
NGS pipelines, pathogen surveillance<br><br>

<b>BitGenome Institute</b><br>
Computational biology mentoring<br><br>

<b>CMU TA</b><br>
Bioinformatics teaching<br><br>

<b>Hiller Lab CMU</b><br>
Comparative genomics<br><br>

<b>IQVIA</b><br>
Clinical data analytics
`
},

{
title: "PUBLICATIONS",
color: 0xec4899,
body: `
Micro & Nanoplastics Detection Review (2021)
`
},

{
title: "ABSTRACTS",
color: 0xf59e0b,
body: `
ISCB-UK 2026 Poster (Accepted)<br>
ISMB 2026 Submission<br>
Research Hub Proposal
`
},

{
title: "TECH STACK",
color: 0x22c55e,
body: `
Python, R, SQL, Bash<br>
Nextflow, Docker, Linux<br>
RNA-seq, ML, Docking
`
},

{
title: "EDUCATION",
color: 0xeab308,
body: `
Carnegie Mellon University (MS)<br>
BMS College of Engineering (BE)
`
},

{
title: "MEMBERSHIP",
color: 0xffffff,
body: `
International Society for Computational Biology (ISCB)
`
},

{
title: "CV",
color: 0xffffff,
body: `
<a class="btn" href="AshitaJawali_CV.pdf">Download CV</a>
`
}

];

/* =========================
   INIT
========================= */
init();

function init(){

scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff,1.2));
let light = new THREE.PointLight(0x00ffaa,1.5);
light.position.set(5,5,5);
scene.add(light);

/* =========================
   HOLOGRAPHIC DESKTOP
========================= */
workspace = new THREE.Group();

let desk = new THREE.Mesh(
new THREE.BoxGeometry(12,0.3,6),
new THREE.MeshStandardMaterial({color:0x0a0a0f})
);
desk.position.y = -1;

let monitor = new THREE.Mesh(
new THREE.BoxGeometry(5,3,0.1),
new THREE.MeshBasicMaterial({color:0x00ffaa,transparent:true,opacity:0.2})
);
monitor.position.set(0,2,0);

workspace.add(desk,monitor);
workspace.position.y = -1;
scene.add(workspace);

/* =========================
   DNA HELIX (FIXED 1 NODE = 1 SECTION)
========================= */
dnaGroup = new THREE.Group();
dnaGroup.visible = false;

for(let i=0;i<dnaData.length;i++){

let d = dnaData[i];

let p1 = sphere(d.color);
let p2 = sphere(d.color);

let y = i*0.8 - 4;
let a = i*0.7;

p1.position.set(Math.cos(a)*1.6,y,Math.sin(a)*1.6);
p2.position.set(Math.cos(a+Math.PI)*1.6,y,Math.sin(a+Math.PI)*1.6);

p1.userData = d;
p2.userData = d;

dnaGroup.add(p1,p2);
}

scene.add(dnaGroup);

/* =========================
   PATHOGEN RAIN
========================= */
rainGroup = new THREE.Group();
rainGroup.visible = false;

const emojis = ["🦠","🧫","🔬","🍄"];

for(let i=0;i<70;i++){

let tex = emoji(emojis[Math.floor(Math.random()*emojis.length)]);

let s = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));

s.position.set(Math.random()*16-8,Math.random()*10+2,Math.random()*6-3);
s.scale.set(0.35,0.35,0.35);
s.userData.speed = 0.01 + Math.random()*0.01;

rainGroup.add(s);
}

scene.add(rainGroup);

camera.position.z = 8;

/* EVENTS */
window.addEventListener("click",onClick);
window.addEventListener("mousemove",e=>{
mouse.x = (e.clientX/innerWidth)*2-1;
mouse.y = -(e.clientY/innerHeight)*2+1;
});

animate();
}

/* =========================
   CLICK
========================= */
function onClick(){

if(!started){

initSound();
typeTerminal();

gsap.to(camera.position,{
z:2,
duration:2,
onComplete:()=>{
workspace.visible=false;
dnaGroup.visible=true;
rainGroup.visible=true;
gsap.to(camera.position,{z:10,duration:1.5});
}
});

document.getElementById("boot").style.display="none";
started=true;
return;
}

raycaster.setFromCamera(mouse,camera);
let hit = raycaster.intersectObjects(dnaGroup.children);

if(hit.length){

let d = hit[0].object.userData;

document.getElementById("panel").style.display="block";
document.getElementById("panel").innerHTML = `<h2>${d.title}</h2>${d.body}`;
}
}

/* =========================
   LOOP + CURSOR
========================= */
function animate(){

requestAnimationFrame(animate);

dnaGroup.rotation.y += 0.002;

rainGroup.children.forEach(r=>{
r.position.y -= r.userData.speed;
if(r.position.y < -5) r.position.y = 10;
});

raycaster.setFromCamera(mouse,camera);
let hit = raycaster.intersectObjects(dnaGroup.children);

hoveringDNA = hit.length > 0;
document.body.classList.toggle("dna", hoveringDNA);

renderer.render(scene,camera);
}

/* HELPERS */
function sphere(c){
return new THREE.Mesh(
new THREE.SphereGeometry(0.12,16,16),
new THREE.MeshStandardMaterial({color:c})
);
}

function emoji(e){
let c=document.createElement("canvas");
c.width=64;c.height=64;
let ctx=c.getContext("2d");
ctx.font="32px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(e,32,32);
return new THREE.CanvasTexture(c);
}

</script>

</body>
</html>
