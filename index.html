<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bio Lab Portfolio System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #05060a;
  font-family: monospace;

  cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="24" font-size="24">🦠</text></svg>'), auto;
}

body.dna {
  cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="24" font-size="24">🧬</text></svg>'), pointer !important;
}

#panel {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 420px;
  max-height: 80vh;
  overflow-y: auto;
  background: rgba(0,0,0,0.92);
  border: 1px solid #00ffaa;
  color: white;
  padding: 18px;
  display: none;
  z-index: 10;
}

#boot {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 50%;
  color: #00ffaa;
  z-index: 20;
}

h2 { color:#00ffaa; }

.btn {
  display:inline-block;
  padding:6px 10px;
  border:1px solid #00ffaa;
  color:#00ffaa;
  text-decoration:none;
  margin-right:5px;
}
.btn:hover { background:#00ffaa; color:black; }
</style>
</head>

<body>

<div id="boot">CLICK TO INITIALIZE BIO LAB SYSTEM</div>
<div id="panel"></div>

<script>

let scene, camera, renderer;
let workspace, dnaGroup, rainGroup;

let started = false;
let hoveringDNA = false;

let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

/* =========================
   STRUCTURED DNA DATA (NO RANDOMNESS)
========================= */
const dnaData = [
{
title: "ABOUT",
color: 0x00ffaa,
body: `
<img src="Ashita_Photo.png" style="width:60%;border-radius:10px;border:2px solid #00ffaa;margin-bottom:10px;">
<p><b>Bioinformatician</b><br>Multi-omics | AI/ML | Drug Discovery</p>
<div style="margin-top:10px;">
<a class="btn" href="https://github.com/Ashita2619">GitHub</a>
<a class="btn" href="https://linkedin.com">LinkedIn</a>
<a class="btn" href="AshitaJawali_CV.pdf">CV</a>
</div>
`
},
{
title: "PROJECTS",
color: 0x4da3ff,
body: `
<b>Lung Cancer Biomarkers</b><br>RNA-seq + ML (F1 0.85)<br><br>
<b>COVID Vaccine Study</b><br>Random Forest / XGBoost<br><br>
<b>NexTSS Pipeline</b><br>Deep learning TSS detection
`
},
{
title: "EXPERIENCE",
color: 0xa855f7,
body: `
<b>KDHE</b><br>NGS pathogen pipelines<br><br>
<b>BitGenome</b><br>Bioinformatics mentoring<br><br>
<b>CMU TA</b><br>Teaching assistant
`
},
{
title: "SKILLS",
color: 0x22c55e,
body: `
Python, R, SQL<br>
Nextflow, Docker<br>
RNA-seq, ML, Docking
`
},
{
title: "EDUCATION",
color: 0xf59e0b,
body: `
Carnegie Mellon University (MS)<br>
BMS College of Engineering (BE)
`
},
{
title: "PUBLICATIONS",
color: 0xec4899,
body: `
Micro & Nanoplastics Detection Review (2021)
`
},
{
title: "MEMBERSHIP",
color: 0xeab308,
body: `
ISCB (International Society for Computational Biology)
`
},
{
title: "CV",
color: 0xffffff,
body: `
<a class="btn" href="AshitaJawali_CV.pdf">Download CV</a>
`
}
];

/* =========================
   INIT
========================= */
init();

function init(){

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 1.2));
let light = new THREE.PointLight(0x00ffaa, 1.5);
light.position.set(5,5,5);
scene.add(light);

/* =========================
   IMPROVED DESKTOP
========================= */
workspace = new THREE.Group();

let desk = new THREE.Mesh(
new THREE.BoxGeometry(12,0.4,6),
new THREE.MeshStandardMaterial({color:0x0b0b0b})
);
desk.position.y = -1;

let monitor = new THREE.Mesh(
new THREE.BoxGeometry(5,3,0.2),
new THREE.MeshStandardMaterial({color:0x000000})
);
monitor.position.set(0,2,0);

let screen = new THREE.Mesh(
new THREE.PlaneGeometry(4.7,2.7),
new THREE.MeshBasicMaterial({color:0x1a1f2a})
);
screen.position.z = 0.11;
monitor.add(screen);

workspace.add(desk, monitor);
workspace.position.y = -1;
scene.add(workspace);

/* =========================
   DNA HELIX (FIXED MAPPING)
========================= */
dnaGroup = new THREE.Group();
dnaGroup.visible = false;

for(let i=0;i<dnaData.length;i++){

let y = i*0.7 - 4;
let a = i*0.8;

let data = dnaData[i];

let p1 = sphere(data.color);
let p2 = sphere(data.color);

p1.position.set(Math.cos(a)*1.6,y,Math.sin(a)*1.6);
p2.position.set(Math.cos(a+Math.PI)*1.6,y,Math.sin(a+Math.PI)*1.6);

p1.userData = data;
p2.userData = data;

let bond = new THREE.Line(
new THREE.BufferGeometry().setFromPoints([p1.position,p2.position]),
new THREE.LineBasicMaterial({color:0xffffff,opacity:0.25,transparent:true})
);

dnaGroup.add(p1,p2,bond);
}

scene.add(dnaGroup);

/* =========================
   PATHOGEN RAIN (BALANCED)
========================= */
rainGroup = new THREE.Group();
rainGroup.visible = false;

const emojis = ["🦠","🧫","🍄","🔬"];

for(let i=0;i<70;i++){

let tex = emoji(emojis[Math.floor(Math.random()*emojis.length)]);

let s = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));

s.position.set(
Math.random()*16-8,
Math.random()*10+2,
Math.random()*6-3
);

s.scale.set(0.35,0.35,0.35);
s.userData.speed = 0.01 + Math.random()*0.01;

rainGroup.add(s);
}

scene.add(rainGroup);

camera.position.z = 8;

/* EVENTS */
window.addEventListener("click",onClick);

window.addEventListener("mousemove",e=>{
mouse.x = (e.clientX/innerWidth)*2-1;
mouse.y = -(e.clientY/innerHeight)*2+1;
});

animate();
}

/* =========================
   CLICK LOGIC (NO DUPLICATES)
========================= */
function onClick(){

if(!started){

gsap.to(camera.position,{
z:2,
duration:2,
onComplete:()=>{
workspace.visible=false;
dnaGroup.visible=true;
rainGroup.visible=true;
gsap.to(camera.position,{z:10,duration:1.5});
}
});

document.getElementById("boot").style.display="none";
started=true;
return;
}

raycaster.setFromCamera(mouse,camera);
let hit = raycaster.intersectObjects(dnaGroup.children);

if(hit.length){

let data = hit[0].object.userData;

let panel = document.getElementById("panel");
panel.style.display = "block";

panel.innerHTML = `<h2>${data.title}</h2>${data.body}`;
}
}

/* =========================
   CURSOR + LOOP
========================= */
function animate(){

requestAnimationFrame(animate);

rainGroup.children.forEach(r=>{
r.position.y -= r.userData.speed;
if(r.position.y < -5) r.position.y = 10;
});

dnaGroup.rotation.y += 0.002;

raycaster.setFromCamera(mouse,camera);
let hit = raycaster.intersectObjects(dnaGroup.children);

hoveringDNA = hit.length > 0;

if(hoveringDNA){
document.body.classList.add("dna");
}else{
document.body.classList.remove("dna");
}

renderer.render(scene,camera);
}

/* helpers */
function sphere(color){
return new THREE.Mesh(
new THREE.SphereGeometry(0.12,16,16),
new THREE.MeshStandardMaterial({color})
);
}

function emoji(e){
let c=document.createElement("canvas");
c.width=64;c.height=64;
let ctx=c.getContext("2d");
ctx.font="32px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(e,32,32);
return new THREE.CanvasTexture(c);
}

</script>

</body>
</html>
