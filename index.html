<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Ashita Jawali | Bioinformatics Portfolio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:#010205; font-family:monospace; color:white; }

#info-panel{
position:absolute; right:40px; top:50%; transform:translateY(-50%);
width:420px; background:rgba(0,0,0,0.9); padding:25px;
border:1px solid #00ffaa; display:none;
}

h2{color:#00ffaa;}
.tag{border:1px solid #5e9eff; padding:2px 6px; margin:3px; display:inline-block;}
.btn{display:inline-block; border:1px solid #333; padding:6px 10px; margin:5px; color:white; text-decoration:none;}
.btn:hover{background:#00ffaa; color:black;}

#boot{
position:fixed; width:100%; height:100%;
display:flex; align-items:center; justify-content:center;
background:#fff; color:black; cursor:pointer; z-index:10;
flex-direction:column;
}
</style>
</head>

<body>

<div id="boot">
<h2>Click to Begin</h2>
</div>

<div id="info-panel">
<div id="content"></div>
</div>

<script>
let scene, camera, renderer;
let dnaGroup, deskGroup;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let INTERSECTED = null;

/* ========= DATA ========= */
const nodes = [
{
title:"ABOUT",
content:`<h2>About</h2>
<p>Bioinformatician working on multi-omics + ML.</p>
<a class="btn" href="https://github.com/Ashita2619" target="_blank">GitHub</a>`
},
{
title:"PROJECTS",
content:`<h2>Projects</h2>
<p>Lung cancer biomarkers, NexTSS, ML pipelines</p>`
},
{
title:"EXPERIENCE",
content:`<h2>Experience</h2>
<p>KDHE Bioinformatician, BitGenome mentor</p>`
},
{
title:"STACK",
content:`<h2>Stack</h2>
<span class="tag">Python</span><span class="tag">R</span><span class="tag">Nextflow</span>`
}
];

/* ========= INIT ========= */
function init(){
scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,8);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.PointLight(0x00ffaa,2);
light.position.set(5,5,5);
scene.add(light);

/* ===== DESK (INTRO SCENE) ===== */
deskGroup = new THREE.Group();

// table
const table = new THREE.Mesh(
new THREE.BoxGeometry(6,0.3,3),
new THREE.MeshStandardMaterial({color:0x222222})
);
deskGroup.add(table);

// monitor
const monitor = new THREE.Mesh(
new THREE.BoxGeometry(1.5,1,0.1),
new THREE.MeshStandardMaterial({color:0x555555})
);
monitor.position.set(0,0.8,0);
deskGroup.add(monitor);

scene.add(deskGroup);

/* ===== DNA ===== */
dnaGroup = new THREE.Group();

const radius = 2;
const height = 10;

for(let i=0;i<30;i++){
let angle = i*0.4;
let y = (i/30)*height - height/2;

let left = new THREE.Mesh(
new THREE.SphereGeometry(0.15),
new THREE.MeshStandardMaterial({color:0x5e9eff})
);

let right = new THREE.Mesh(
new THREE.SphereGeometry(0.15),
new THREE.MeshStandardMaterial({color:0x00ffaa})
);

left.position.set(Math.cos(angle)*radius,y,Math.sin(angle)*radius);
right.position.set(Math.cos(angle+Math.PI)*radius,y,Math.sin(angle+Math.PI)*radius);

left.userData = nodes[i % nodes.length];
right.userData = nodes[i % nodes.length];

// bond
const bondGeom = new THREE.BufferGeometry().setFromPoints([
left.position, right.position
]);
const bond = new THREE.Line(bondGeom, new THREE.LineBasicMaterial({color:0xffffff}));

dnaGroup.add(left, right, bond);
}

dnaGroup.visible = false;
scene.add(dnaGroup);

animate();
}

/* ========= BOOT CLICK ========= */
document.getElementById("boot").onclick = () => {

gsap.to("#boot",{opacity:0,duration:0.5,onComplete:()=>{
document.getElementById("boot").style.display="none";
}});

// move camera through monitor
gsap.to(camera.position,{
z:2, duration:1.5, ease:"power2.inOut",
onComplete:()=>{
deskGroup.visible=false;
dnaGroup.visible=true;

gsap.to(camera.position,{z:6,duration:1});
}
});

};

/* ========= INTERACTION ========= */
window.addEventListener("mousemove",e=>{
mouse.x = (e.clientX/innerWidth)*2-1;
mouse.y = -(e.clientY/innerHeight)*2+1;
});

window.addEventListener("click",()=>{

raycaster.setFromCamera(mouse,camera);
let intersects = raycaster.intersectObjects(dnaGroup.children);

if(intersects.length){
let obj = intersects[0].object;

if(obj.userData){
document.getElementById("info-panel").style.display="block";
document.getElementById("content").innerHTML = obj.userData.content;

// camera zoom to node
gsap.to(camera.position,{
x:obj.position.x,
y:obj.position.y,
z:obj.position.z + 2,
duration:1
});
}
}

});

/* ========= HOVER ========= */
function hoverEffect(){
raycaster.setFromCamera(mouse,camera);
let intersects = raycaster.intersectObjects(dnaGroup.children);

if(INTERSECTED) INTERSECTED.material.emissive?.set(0x000000);

if(intersects.length){
INTERSECTED = intersects[0].object;
if(INTERSECTED.material.emissive)
INTERSECTED.material.emissive.set(0x222222);
}
}

/* ========= ANIMATE ========= */
function animate(){
requestAnimationFrame(animate);

hoverEffect();

dnaGroup.rotation.y += 0.003;

renderer.render(scene,camera);
}

/* ========= RESIZE ========= */
window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

init();
</script>
</body>
</html>
