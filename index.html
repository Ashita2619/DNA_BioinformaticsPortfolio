<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bio Lab Portfolio System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #05060a;
  font-family: monospace;

  /* 🦠 default cursor */
  cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="24" font-size="24">🦠</text></svg>'), auto;
}

/* 🧬 DNA cursor */
body.dna {
  cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="24" font-size="24">🧬</text></svg>'), pointer !important;
}

#panel {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 420px;
  max-height: 80vh;
  overflow-y: auto;
  background: rgba(0,0,0,0.92);
  border: 1px solid #00ffaa;
  color: white;
  padding: 18px;
  display: none;
  z-index: 10;
}

#boot {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 50%;
  color: #00ffaa;
  letter-spacing: 2px;
  z-index: 20;
}

h2 { color:#00ffaa; }

.btn {
  display:inline-block;
  padding:6px 10px;
  border:1px solid #00ffaa;
  color:#00ffaa;
  text-decoration:none;
  margin-right:5px;
}
.btn:hover { background:#00ffaa; color:black; }
</style>
</head>

<body>

<div id="boot">CLICK TO INITIALIZE BIO LAB SYSTEM</div>
<div id="panel"></div>

<script>

let scene, camera, renderer;
let workspace, dnaGroup, rainGroup;

let started = false;
let dnaMode = false;

let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let hoveringDNA = false;

/* =========================
   CLEAN DATA (FIXED)
========================= */
const dnaData = [
{
title: "USER: ASHITA JAWALI",
body: `
<img src="Ashita_Photo.png" style="width:60%;border-radius:10px;border:2px solid #00ffaa;margin-bottom:10px;">

<p><b>Bioinformatician</b><br>Topeka, Kansas, USA</p>

<div style="margin-top:10px;">
<a href="https://github.com/Ashita2619" class="btn">GitHub</a>
<a href="https://www.linkedin.com/in/ashita-jawali-9a6872198/" class="btn">LinkedIn</a>
<a href="AshitaJawali_CV.pdf" class="btn">CV</a>
</div>

 <h2>About</h2>
 <p class="muted">
    Bioinformatician working at the intersection of multi-omics, machine learning, and drug discovery. My work focuses on analyzing large-scale genomic and transcriptomic datasets, building reproducible bioinformatics pipelines, and applying computational approaches to biomarker discovery and disease research.
 </p>

<p style="margin-top:10px;">ashita.bt18@bmsce.ac.in</p>
`
},
{
title: "PROJECTS",
body: `
Lung Cancer Biomarkers (F1 0.85)<br>
NexTSS Deep Learning Pipeline<br>
COVID Vaccine ML Study<br>
Diabetes Prediction Model<br>
SARS-CoV2 Docking Study
`
},
{
title: "EXPERIENCE",
body: `
KDHE - Bioinformatician (NGS pipelines)<br>
BitGenome - Mentor<br>
CMU TA - Bioinformatics<br>
IQVIA - Clinical Analytics
`
},
{
title: "TECH STACK",
body: `
Python, R, SQL, Bash<br>
Nextflow, Docker, Linux<br>
RNA-seq, ML, Docking
`
},
{
title: "EDUCATION",
body: `
MS - Carnegie Mellon University<br>
BE - BMS College of Engineering
`
},
{
title: "CV",
body: `<a class="btn" href="AshitaJawali_CV.pdf">Download CV</a>`
}
];

/* =========================
   INIT
========================= */
init();

function init(){

scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
let light = new THREE.PointLight(0x00ffaa, 1.5);
light.position.set(5,5,5);
scene.add(light);

/* =========================
   IMPROVED DESKTOP
========================= */
workspace = new THREE.Group();

let desk = new THREE.Mesh(
new THREE.BoxGeometry(12,0.5,6),
new THREE.MeshStandardMaterial({color:0x0b0b0b})
);
desk.position.y = -1;

let monitor = new THREE.Mesh(
new THREE.BoxGeometry(5,3,0.2),
new THREE.MeshStandardMaterial({color:0x000000})
);
monitor.position.set(0,2,0);

let screen = new THREE.Mesh(
new THREE.PlaneGeometry(4.7,2.7),
new THREE.MeshBasicMaterial({color:0x111827})
);
screen.position.z = 0.11;
monitor.add(screen);

let glow = new THREE.Mesh(
new THREE.PlaneGeometry(4.5,2.5),
new THREE.MeshBasicMaterial({color:0x00ffaa, transparent:true, opacity:0.15})
);
glow.position.z = 0.12;
monitor.add(glow);

workspace.add(desk, monitor);
workspace.position.y = -1;
scene.add(workspace);

/* =========================
   DNA HELIX
========================= */
dnaGroup = new THREE.Group();
dnaGroup.visible = false;

for(let i=0;i<40;i++){

let y = i*0.3 - 6;
let a = i*0.45;

let p1 = sphere(0x00ffaa);
let p2 = sphere(0x5e9eff);

p1.position.set(Math.cos(a)*1.6,y,Math.sin(a)*1.6);
p2.position.set(Math.cos(a+Math.PI)*1.6,y,Math.sin(a+Math.PI)*1.6);

let bond = new THREE.Line(
new THREE.BufferGeometry().setFromPoints([p1.position,p2.position]),
new THREE.LineBasicMaterial({color:0xffffff,opacity:0.25,transparent:true})
);

dnaGroup.add(p1,p2,bond);
}

scene.add(dnaGroup);

/* =========================
   PATHOGEN RAIN (SMALL)
========================= */
rainGroup = new THREE.Group();
rainGroup.visible = false;

const emojis = ["🦠","🧫","🍄","🔬","⚗️"];

for(let i=0;i<90;i++){

let tex = emoji(emojis[Math.floor(Math.random()*emojis.length)]);

let s = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));

s.position.set(
Math.random()*18-9,
Math.random()*12+2,
Math.random()*6-3
);

s.scale.set(0.3,0.3,0.3);
s.userData.speed = 0.01 + Math.random()*0.01;

rainGroup.add(s);
}

scene.add(rainGroup);

camera.position.z = 8;

/* EVENTS */
window.addEventListener("click", onClick);

window.addEventListener("mousemove", e=>{
mouse.x = (e.clientX/innerWidth)*2-1;
mouse.y = -(e.clientY/innerHeight)*2+1;
});

animate();
}

/* =========================
   CLICK
========================= */
function onClick(){

if(!started){

gsap.to(camera.position,{
z:2,
duration:2,
onComplete:()=>{
workspace.visible=false;
dnaGroup.visible=true;
rainGroup.visible=true;
gsap.to(camera.position,{z:10,duration:1.5});
}
});

document.getElementById("boot").style.display="none";
started=true;
return;
}

raycaster.setFromCamera(mouse,camera);
let hit = raycaster.intersectObjects(dnaGroup.children);

if(hit.length){

dnaMode = true;

let panel = document.getElementById("panel");
panel.style.display="block";

let i = Math.floor(Math.random()*dnaData.length);
panel.innerHTML = `<h2>${dnaData[i].title}</h2>${dnaData[i].body}`;
}
}

/* =========================
   LOOP + CURSOR FIX
========================= */
function animate(){

requestAnimationFrame(animate);

/* rain */
rainGroup.children.forEach(r=>{
r.position.y -= r.userData.speed;
if(r.position.y < -5) r.position.y = 10;
});

/* DNA rotation */
dnaGroup.rotation.y += 0.002;

/* cursor logic */
raycaster.setFromCamera(mouse,camera);
let hit = raycaster.intersectObjects(dnaGroup.children);

hoveringDNA = hit.length > 0;

if(dnaMode || hoveringDNA){
document.body.classList.add("dna");
} else {
document.body.classList.remove("dna");
}

renderer.render(scene,camera);
}

/* helpers */
function sphere(c){
return new THREE.Mesh(
new THREE.SphereGeometry(0.12,16,16),
new THREE.MeshStandardMaterial({color:c})
);
}

function emoji(e){
let c=document.createElement("canvas");
c.width=64;c.height=64;
let ctx=c.getContext("2d");
ctx.font="32px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(e,32,32);
return new THREE.CanvasTexture(c);
}

</script>

</body>
</html>
