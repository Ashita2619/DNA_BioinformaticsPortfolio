<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bio Lab Portfolio System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #05060a;
  font-family: monospace;

  /* DEFAULT CURSOR (BACTERIA 🦠) */
  cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="24" font-size="22">🦠</text></svg>'), auto;
}

/* DNA CURSOR */
body.dna {
  cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="24" font-size="22">🧬</text></svg>'), pointer;
}

/* PANEL */
#panel {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 420px;
  max-height: 80vh;
  overflow-y: auto;
  background: rgba(0,0,0,0.92);
  border: 1px solid #00ffaa;
  color: white;
  padding: 18px;
  display: none;
  z-index: 10;
}

h2 { color:#00ffaa; }

#boot {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 50%;
  color: #00ffaa;
  letter-spacing: 2px;
  z-index: 20;
}
</style>
</head>

<body>

<div id="boot">CLICK TO INITIALIZE BIO LAB SYSTEM</div>
<div id="panel"></div>

<script>

let scene, camera, renderer;
let workspace, dnaGroup, rainGroup;
let started = false;

let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

/* FULL CONTENT */
const nodes = [

{
title:"ABOUT",
html:`
<img src="Ashita_Photo.png" style="width:100%;border-radius:10px;border:2px solid #00ffaa;margin-bottom:10px;">
<p><b>Bioinformatician | Multi-omics | AI/ML | Drug Discovery</b></p>

<a class="btn" href="AshitaJawali_CV.pdf">CV</a>
<a class="btn" href="https://github.com/Ashita2619">GitHub</a>
<a class="btn" href="https://linkedin.com">LinkedIn</a>
`
},

{
title:"PROJECTS",
html:`
Lung Cancer Biomarkers (RNA-seq + ML)<br>
COVID Vaccine Analysis (XGBoost)<br>
NexTSS Deep Learning Pipeline<br>
Diabetes Prediction Model<br>
SARS-CoV2 Docking`
},

{
title:"EXPERIENCE",
html:`
KDHE Bioinformatician<br>
BitGenome Mentor<br>
CMU TA<br>
Hiller Lab CMU<br>
IQVIA Analyst`
},

{
title:"PUBLICATIONS",
html:`Micro & Nanoplastics Detection Review (2021)`
},

{
title:"MEMBERSHIP",
html:`ISCB Member`
}

];

/* INIT */
init();

function init(){

scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff,1.2));
let light = new THREE.PointLight(0x00ffaa,1.5);
light.position.set(5,5,5);
scene.add(light);

/* ======================
   IMPROVED DESKTOP
====================== */
workspace = new THREE.Group();

let desk = new THREE.Mesh(
new THREE.BoxGeometry(10,0.3,5),
new THREE.MeshStandardMaterial({color:0x111111, roughness:0.8})
);

let monitor = new THREE.Mesh(
new THREE.BoxGeometry(4,2.5,0.2),
new THREE.MeshStandardMaterial({color:0x000000})
);

monitor.position.y = 1.5;

workspace.add(desk, monitor);
scene.add(workspace);

/* ======================
   DNA (BETTER BONDS)
====================== */
dnaGroup = new THREE.Group();
dnaGroup.visible = false;

for(let i=0;i<40;i++){

let y = i*0.3-6;
let a = i*0.45;

let p1 = sphere(0x00ffaa);
let p2 = sphere(0x5e9eff);

p1.position.set(Math.cos(a)*1.5,y,Math.sin(a)*1.5);
p2.position.set(Math.cos(a+Math.PI)*1.5,y,Math.sin(a+Math.PI)*1.5);

/* REALISTIC BOND */
let bond = new THREE.Line(
new THREE.BufferGeometry().setFromPoints([
p1.position.clone(),
p2.position.clone()
]),
new THREE.LineBasicMaterial({color:0xffffff,opacity:0.2,transparent:true})
);

dnaGroup.add(p1,p2,bond);
}

scene.add(dnaGroup);

/* ======================
   SMALLER RAIN FIXED
====================== */
rainGroup = new THREE.Group();
rainGroup.visible = false;

const emojis = ["🦠","🧫","🍄","🔬","⚗️"];

for(let i=0;i<80;i++){

let tex = emoji(emojis[Math.floor(Math.random()*emojis.length)]);

let s = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));

s.position.set(
Math.random()*16-8,
Math.random()*12+2,
Math.random()*6-3
);

s.scale.set(0.15,0.15,0.15); // FIXED SIZE
s.userData.speed = 0.008 + Math.random()*0.01;

rainGroup.add(s);
}

scene.add(rainGroup);

camera.position.z = 8;

/* EVENTS */
window.addEventListener("click",onClick);

window.addEventListener("mousemove",e=>{
mouse.x = (e.clientX/innerWidth)*2-1;
mouse.y = -(e.clientY/innerHeight)*2+1;
});

animate();
}

/* CLICK */
function onClick(){

if(!started){

gsap.to(camera.position,{
z:2,
duration:2,
onComplete:()=>{
workspace.visible=false;
dnaGroup.visible=true;
rainGroup.visible=true;
gsap.to(camera.position,{z:10,duration:1.5});
}
});

document.getElementById("boot").style.display="none";
started=true;

}else{

raycaster.setFromCamera(mouse,camera);
let hit = raycaster.intersectObjects(dnaGroup.children);

if(hit.length){
let panel = document.getElementById("panel");
panel.style.display="block";

let index = Math.floor(Math.random()*nodes.length);
panel.innerHTML = nodes[index].html;
}
}
}

/* HELPERS */
function sphere(c){
return new THREE.Mesh(
new THREE.SphereGeometry(0.1,16,16),
new THREE.MeshStandardMaterial({color:c})
);
}

function emoji(e){
let c=document.createElement("canvas");
c.width=64;c.height=64;
let ctx=c.getContext("2d");
ctx.font="28px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(e,32,32);
return new THREE.CanvasTexture(c);
}

/* LOOP */
function animate(){

requestAnimationFrame(animate);

/* DNA CURSOR MODE */
raycaster.setFromCamera(mouse,camera);
let hit = raycaster.intersectObjects(dnaGroup.children);

if(hit.length){
document.body.classList.add("dna");
}else{
document.body.classList.remove("dna");
}

/* RAIN */
if(rainGroup.visible){
rainGroup.children.forEach(r=>{
r.position.y -= r.userData.speed;
if(r.position.y < -5) r.position.y = 10;
});
}

/* DNA ROTATION */
dnaGroup.rotation.y += 0.002;

renderer.render(scene,camera);
}

</script>
</body>
</html>
