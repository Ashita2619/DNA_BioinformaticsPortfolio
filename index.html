<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ashita Jawali | Bio-Interactive Terminal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root {
      --bg: #050a14;
      --panel: rgba(11, 18, 32, 0.94);
      --accent: #7aa2ff;
      --accent2: #7affd0;
      --text: #e9eefc;
      --muted: #b7c3e6;
    }

    body { 
      margin: 0; 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Segoe UI', Tahoma, sans-serif; 
      overflow: hidden;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" style="font-size:24px"><text y="20">🦠</text></svg>'), auto;
    }

    .dna-cursor {
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" style="font-size:24px"><text y="20">🧬</text></svg>'), pointer !important;
    }

    #canvas-container { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
      background: radial-gradient(circle at 50% 50%, #0d1b33 0%, #050a14 100%);
    }

    #info-panel {
      position: absolute;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      width: 480px;
      max-height: 85vh;
      overflow-y: auto;
      background: var(--panel);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(122, 255, 208, 0.25);
      border-radius: 24px;
      padding: 35px;
      z-index: 10;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
      transition: all 0.4s ease-out;
    }

    .hidden { opacity: 0; transform: translateY(-40%) scale(0.95); pointer-events: none; }

    .profile-img {
      width: 110px; height: 110px; border-radius: 22px; 
      border: 2px solid var(--accent); margin-bottom: 15px;
    }

    h2 { color: var(--accent2); margin: 0 0 15px; font-size: 24px; font-weight: 900; letter-spacing: 1px; border-bottom: 1px solid rgba(122, 255, 208, 0.2); padding-bottom: 10px; }
    .section-title { color: var(--accent); font-weight: 800; font-size: 13px; margin-top: 18px; display: block; text-transform: uppercase; letter-spacing: 1px;}
    .muted { color: var(--muted); font-size: 14.5px; line-height: 1.6; margin: 10px 0; }
    
    .resume-btn {
      display: inline-block; margin-top: 20px; padding: 12px 24px; background: var(--accent2);
      color: #050a14; text-decoration: none; font-weight: 800; border-radius: 12px;
      text-transform: uppercase; font-size: 12px; transition: 0.3s;
    }

    .instruction {
      position: absolute; top: 30px; width: 100%; text-align: center;
      color: var(--accent2); font-family: monospace; letter-spacing: 3px;
      z-index: 5; pointer-events: none; opacity: 0.6; font-size: 11px;
    }

    .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: var(--text); padding: 5px 12px; border-radius: 8px; cursor: pointer; }
    
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 10px; }
  </style>
</head>

<body>
  <div id="canvas-container"></div>
  <div class="instruction">>>> BIOMETRIC DATA DETECTED // INTERACT WITH HELIX <<<</div>

  <div id="info-panel" class="hidden">
    <button class="close-btn" onclick="closePanel()">[X] CLOSE</button>
    <div id="panel-content"></div>
  </div>

  <script>
    let scene, camera, renderer, dnaGroup, particles;
    let raycaster, mouse;
    const infoPanel = document.getElementById('info-panel');
    const content = document.getElementById('panel-content');

    const dnaData = [
      {
        title: "SYSTEM USER: ASHITA JAWALI",
        body: `<img src="Ashita_Photo.png" class="profile-img"><p class="muted"><strong>Bioinformatician</strong><br>Topeka, Kansas, USA<br><br>Dedicated to solving complex biological puzzles using high-throughput sequencing and ML.</p><span class="section-title">CONTACT DECODE</span><p class="muted">Email: ashita.bt18@bmsce.ac.in<br>GitHub: @Ashita2619</p>`
      },
      {
        title: "EXPERIENCE LOGS",
        body: `<span class="section-title">KDHE (2024 - Present)</span><p class="muted">Bioinformatician. Designing NGS pipelines for pathogen surveillance.</p><span class="section-title">BITGENOME (2026 - Present)</span><p class="muted">Computational Biologist. Mentoring in practical pipeline development.</p>`
      },
      {
        title: "TECHNICAL GENOME",
        body: `<span class="section-title">LANGUAGES</span><p class="muted">Python, R, SQL, Bash, Linux shell scripting.</p><span class="section-title">COMPUTATIONAL BIOLOGY</span><p class="muted">Nextflow, Docker, Git, Variant Calling, RNA-seq, Molecular Docking.</p>`
      },
      {
        title: "ACADEMIC SEQUENCE",
        body: `<span class="section-title">CARNEGIE MELLON UNIVERSITY</span><p class="muted">M.S. in Quantitative Biology and Bioinformatics (2023).</p><span class="section-title">B.M.S. COLLEGE OF ENGINEERING</span><p class="muted">Bachelor of Engineering in Biotechnology (2022).<br>GPA: 8.56 / 10</p>`
      },
      {
        title: "PUBLISHED RESEARCH",
        body: `<span class="section-title">PEER REVIEWED</span><p class="muted">Asian Journal of Biotech (2021). Micro and Nanoplastics detection.</p><span class="section-title">ABSTRACTS & GRANTS</span><p class="muted">• ISMB 2026<br>• ISCB-UK 2026<br>• Research Hub Grant Proposal</p>`
      },
      {
        title: "MEMBERSHIPS & CV",
        body: `<span class="section-title">AFFILIATIONS</span><p class="muted">ISCB Member</p><span class="section-title">OFFICIAL DOCUMENT</span><p class="muted">Download the full verified curriculum vitae.</p><a href="AshitaJawali_CV.pdf" target="_blank" class="resume-btn">Download Resume</a>`
      }
    ];

    function createPathogenTexture() {
      // Create a canvas to draw a organic "microbe" shape
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
      gradient.addColorStop(0, 'rgba(122, 255, 208, 1)');
      gradient.addColorStop(0.4, 'rgba(122, 255, 208, 0.3)');
      gradient.addColorStop(1, 'rgba(122, 255, 208, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      // Draw a slightly irregular circle to look like a pathogen
      ctx.arc(32, 32, 24, 0, Math.PI * 2);
      ctx.fill();
      return new THREE.CanvasTexture(canvas);
    }

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      // 1. Pathogen Rain (The updated bio-particles)
      const pCount = 250;
      const pGeo = new THREE.BufferGeometry();
      const pPos = new Float32Array(pCount * 3);
      for(let i=0; i<pCount*3; i++) pPos[i] = (Math.random()-0.5)*50;
      pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
      
      particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ 
        map: createPathogenTexture(), 
        size: 0.6, 
        transparent: true, 
        opacity: 0.6,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      }));
      scene.add(particles);

      // 2. DNA Helix
      dnaGroup = new THREE.Group();
      const numSteps = 12; const twist = 0.5;
      for (let i = 0; i < numSteps; i++) {
        const sphereGeo = new THREE.SphereGeometry(0.38, 32, 32);
        const data = dnaData[i % dnaData.length];
        const s1 = new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({ color: 0x7aa2ff, emissive: 0x0a1a33 }));
        s1.position.set(Math.cos(i*twist)*4.5, i*1.3-8, Math.sin(i*twist)*4.5);
        s1.userData = data; dnaGroup.add(s1);
        const s2 = new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({ color: 0x7affd0, emissive: 0x0a331a }));
        s2.position.set(Math.cos(i*twist + Math.PI)*4.5, i*1.3-8, Math.sin(i*twist + Math.PI)*4.5);
        s2.userData = data; dnaGroup.add(s2);
        const cyl = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 9, 8), new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 }));
        cyl.position.set(0, i*1.3-8, 0); cyl.rotation.z = Math.PI/2; cyl.rotation.y = -i*twist;
        dnaGroup.add(cyl);
      }
      scene.add(dnaGroup);
      
      const pLight = new THREE.PointLight(0xffffff, 1.5, 100); pLight.position.set(10, 10, 10); scene.add(pLight);
      scene.add(new THREE.AmbientLight(0x404040));
      camera.position.z = 16;

      window.addEventListener('mousedown', () => {
        raycaster.setFromCamera(mouse, camera);
        const hit = raycaster.intersectObjects(dnaGroup.children);
        if (hit.length > 0 && hit[0].object.userData.title) {
          infoPanel.classList.remove('hidden');
          content.innerHTML = `<h2>${hit[0].object.userData.title}</h2>${hit[0].object.userData.body}`;
        }
      });

      window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      });

      animate();
    }

    function closePanel() { infoPanel.classList.add('hidden'); }

    function animate() {
      requestAnimationFrame(animate);
      dnaGroup.rotation.y += 0.003;
      
      const pos = particles.geometry.attributes.position.array;
      for (let i = 0; i < pos.length; i += 3) {
        // Falling motion
        pos[i+1] -= 0.02; 
        // Side-to-side drift (wobble)
        pos[i] += Math.sin(Date.now() * 0.001 + i) * 0.005; 
        
        if (pos[i+1] < -25) pos[i+1] = 25;
      }
      particles.geometry.attributes.position.needsUpdate = true;

      raycaster.setFromCamera(mouse, camera);
      const hit = raycaster.intersectObjects(dnaGroup.children);
      document.body.classList.toggle('dna-cursor', hit.length > 0);

      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
