<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ashita Jawali | Bio-Interactive Terminal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root {
      --bg: #050a14;
      --panel: rgba(11, 18, 32, 0.92);
      --accent: #7aa2ff;
      --accent2: #7affd0;
      --text: #e9eefc;
      --muted: #b7c3e6;
    }

    /* CURSOR DEFINITIONS */
    body { 
      margin: 0; 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Segoe UI', sans-serif; 
      overflow: hidden;
      /* Default: Bacteria 🦠 */
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" style="font-size:24px"><text y="20">🦠</text></svg>'), auto;
    }

    .dna-cursor {
      /* Hover: DNA 🧬 */
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" style="font-size:24px"><text y="20">🧬</text></svg>'), pointer !important;
    }

    #canvas-container { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
      background: radial-gradient(circle at 50% 50%, #0d1b33 0%, #050a14 100%);
    }

    #info-panel {
      position: absolute;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      width: 450px;
      max-height: 85vh;
      overflow-y: auto;
      background: var(--panel);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(122, 255, 208, 0.25);
      border-radius: 24px;
      padding: 35px;
      z-index: 10;
      box-shadow: 0 0 60px rgba(0,0,0,0.7);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .hidden { opacity: 0; transform: translateY(-40%) scale(0.95); pointer-events: none; }

    #panel-content img {
      width: 110px; height: 110px; border-radius: 22px; 
      border: 2px solid var(--accent); margin-bottom: 15px;
    }

    h2 { color: var(--accent2); margin: 0 0 15px; font-size: 22px; font-weight: 900; letter-spacing: 1px; }
    .section-title { color: var(--accent); font-weight: 800; font-size: 14px; margin-top: 15px; display: block; text-transform: uppercase; }
    .muted { color: var(--muted); font-size: 14.5px; line-height: 1.6; }
    
    .resume-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: var(--accent2);
      color: #050a14;
      text-decoration: none;
      font-weight: 800;
      border-radius: 12px;
      text-transform: uppercase;
      font-size: 13px;
    }

    .instruction {
      position: absolute; top: 30px; width: 100%; text-align: center;
      color: var(--accent2); font-family: monospace; letter-spacing: 3px;
      z-index: 5; pointer-events: none; opacity: 0.6; font-size: 11px;
    }

    .close-btn {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,0.1); border: none;
      color: var(--text); padding: 5px 12px; border-radius: 8px; cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="canvas-container"></div>
  <div class="instruction">ENVIRONMENT LOADED // SCANNING MICROBIAL DRIFT</div>

  <div id="info-panel" class="hidden">
    <button class="close-btn" onclick="closePanel()">CLOSE [X]</button>
    <div id="panel-content"></div>
  </div>

  <script>
    let scene, camera, renderer, dnaGroup, raycaster, mouse;
    let particles, particleCount = 150;
    const infoPanel = document.getElementById('info-panel');
    const content = document.getElementById('panel-content');

    const dnaData = [
      {
        title: "01. GENOMIC IDENTITY",
        body: `<img src="Ashita_Photo.png" alt="Ashita Jawali"><p class="muted"><strong>Ashita Jawali</strong><br>Bioinformatician | Topeka, Kansas.<br><br>Bridging the gap between raw biological sequences and clinical insights through computational power.</p>`
      },
      {
        title: "02. FULL CURRICULUM VITAE",
        body: `<p class="muted">Access the complete technical dossier including full academic records and project methodology.</p><a href="AshitaJawali_CV.pdf" target="_blank" class="resume-btn">Download Resume (PDF)</a>`
      },
      {
        title: "03. PROFESSIONAL NODES",
        body: `<div class="muted"><strong>Bioinformatician @ KDHE</strong> (2024-Present)<br>Leading NGS pipeline design for pathogen surveillance.<br><br><strong>Computational Biologist @ BitGenome</strong><br>Mentor for genomic data analysis.</div>`
      },
      {
        title: "04. TECHNICAL STACK",
        body: `<span class="section-title">Computing</span><p class="muted">Python, R, SQL, Bash, Linux, Git</p><span class="section-title">Bioinformatics</span><p class="muted">Nextflow, Docker, RNA-seq, Variant Calling</p>`
      },
      {
        title: "05. ACADEMIC SEQUENCE",
        body: `<p class="muted"><strong>Master of Science (2023)</strong><br>Carnegie Mellon University<br><br><strong>Bachelor of Engineering (2022)</strong><br>B.M.S. College of Engineering</p>`
      },
      {
        title: "06. RESEARCH & ABSTRACTS",
        body: `<p class="muted">• Detection of Nanoplastics (2021)<br>• ISMB 2026 Abstract Submission<br>• ISCB-UK 2026 Poster</p>`
      }
    ];

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      // 1. CREATE MICROBIAL RAIN
      const particleGeo = new THREE.BufferGeometry();
      const posArray = new Float32Array(particleCount * 3);

      for(let i = 0; i < particleCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 40; // Spread them out
      }
      particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
      
      const particleMat = new THREE.PointsMaterial({
        size: 0.15,
        color: 0x7affd0,
        transparent: true,
        opacity: 0.5,
        blending: THREE.AdditiveBlending
      });

      particles = new THREE.Points(particleGeo, particleMat);
      scene.add(particles);

      // 2. CREATE DNA HELIX
      dnaGroup = new THREE.Group();
      const numPoints = 12; 
      const twist = 0.5;
      const stepHeight = 1.1;

      for (let i = 0; i < numPoints; i++) {
        const sphereGeo = new THREE.SphereGeometry(0.38, 32, 32);
        const dataIndex = i % dnaData.length;

        const s1 = new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({ color: 0x7aa2ff, emissive: 0x0a1a33 }));
        s1.position.set(Math.cos(i * twist) * 4.5, i * stepHeight - 6, Math.sin(i * twist) * 4.5);
        s1.userData = dnaData[dataIndex]; 
        dnaGroup.add(s1);

        const s2 = new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({ color: 0x7affd0, emissive: 0x0a331a }));
        s2.position.set(Math.cos(i * twist + Math.PI) * 4.5, i * stepHeight - 6, Math.sin(i * twist + Math.PI) * 4.5);
        s2.userData = dnaData[dataIndex];
        dnaGroup.add(s2);

        const cylinder = new THREE.Mesh(
          new THREE.CylinderGeometry(0.04, 0.04, 9, 8),
          new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 })
        );
        cylinder.position.set(0, i * stepHeight - 6, 0);
        cylinder.rotation.z = Math.PI / 2;
        cylinder.rotation.y = -i * twist;
        dnaGroup.add(cylinder);
      }

      scene.add(dnaGroup);
      
      const pLight = new THREE.PointLight(0xffffff, 1.5, 100);
      pLight.position.set(10, 10, 10);
      scene.add(pLight);
      scene.add(new THREE.AmbientLight(0x404040));

      camera.position.z = 15;

      window.addEventListener('mousedown', () => {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(dnaGroup.children);
        if (intersects.length > 0) {
          const data = intersects[0].object.userData;
          if (data.title) {
            infoPanel.classList.remove('hidden');
            content.innerHTML = `<h2>${data.title}</h2>${data.body}`;
          }
        }
      });

      window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      });

      animate();
    }

    function closePanel() { infoPanel.classList.add('hidden'); }

    function animate() {
      requestAnimationFrame(animate);
      
      // Rotate DNA
      dnaGroup.rotation.y += 0.003;

      // Animate Microbial Rain (Falling)
      const positions = particles.geometry.attributes.position.array;
      for (let i = 1; i < positions.length; i += 3) {
        positions[i] -= 0.02; // Fall speed
        if (positions[i] < -20) positions[i] = 20; // Reset to top
      }
      particles.geometry.attributes.position.needsUpdate = true;
      particles.rotation.y += 0.001; // Slight swirl
      
      // Cursor Logic
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(dnaGroup.children);
      if (intersects.length > 0) {
        document.body.classList.add('dna-cursor');
      } else {
        document.body.classList.remove('dna-cursor');
      }

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
