<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ashita Jawali | Bioinformatician</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #010205;
  --panel: rgba(2, 5, 12, 0.98);
  --accent: #5e9eff;
  --accent2: #00ffaa;
  --text: #ffffff;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  overflow: hidden;
}

/* INTRO */
#boot-screen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 5000;
  cursor: pointer;
}

#desktop-img {
  width: 60%;
  max-width: 900px;
}

#boot-text {
  margin-top: 20px;
  background: black;
  color: white;
  padding: 8px 16px;
  font-size: 12px;
  letter-spacing: 2px;
}

/* CRT */
#crt-overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1000;
}

/* PANEL */
#info-panel {
  position: absolute;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  width: 480px;
  max-height: 85vh;
  overflow-y: auto;
  background: var(--panel);
  border: 1px solid rgba(0,255,170,0.5);
  padding: 30px;
  display: none;
  z-index: 2000;
}

h2 {
  color: var(--accent2);
  font-size: 18px;
  border-left: 3px solid var(--accent2);
  padding-left: 10px;
}

.text {
  font-size: 13px;
  line-height: 1.6;
  color: #cbd5e1;
}

.tag {
  display: inline-block;
  padding: 3px 8px;
  border: 1px solid var(--accent);
  margin: 3px;
  font-size: 10px;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  margin-right: 8px;
  padding: 8px 12px;
  border: 1px solid #334155;
  text-decoration: none;
  color: white;
  font-size: 10px;
}

.btn:hover {
  background: var(--accent2);
  color: black;
}

.close-btn {
  float: right;
  cursor: pointer;
  color: red;
}

/* HINT */
#hint {
  position: fixed;
  bottom: 20px;
  left: 20px;
  font-size: 10px;
  color: var(--accent2);
}
</style>
</head>

<body>

<div id="boot-screen">
  <img src="your-desktop-image.png" id="desktop-img">
  <div id="boot-text">CLICK ANYWHERE TO BEGIN</div>
</div>

<div id="crt-overlay"></div>
<div id="hint">INTERACT WITH DNA NODES</div>

<div id="info-panel">
  <span class="close-btn" onclick="closePanel()">[ CLOSE ]</span>
  <div id="content-area"></div>
</div>

<script>
let scene, camera, renderer, dna, rain;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

/* ===== DATA ===== */
const nodes = [

{
title: "ABOUT",
content: `
<h2>About</h2>
<p class="text">
Bioinformatician working at the intersection of multi-omics, machine learning, and drug discovery.
</p>

<a class="btn" href="https://github.com/Ashita2619" target="_blank">GitHub</a>
<a class="btn" href="https://www.linkedin.com/in/ashita-jawali-9a6872198/" target="_blank">LinkedIn</a>
<a class="btn" href="AshitaJawali_CV.pdf" target="_blank">CV</a>

<div style="margin-top:15px;">
<span class="tag">Bioinformatics</span>
<span class="tag">Multi-omics</span>
<span class="tag">Machine Learning</span>
<span class="tag">Drug Discovery</span>
<span class="tag">RNA-seq</span>
</div>
`
},

{
title: "PROJECTS",
content: `
<h2>Projects</h2>

<p class="text"><b>Lung Cancer Biomarkers</b></p>
<ul class="text">
<li>RNA-seq + ML (F1 up to 0.85)</li>
<li>Pathway interpretation</li>
</ul>

<p class="text"><b>NexTSS Pipeline</b></p>
<ul class="text">
<li>Deep learning TSS detection</li>
<li>HPC workflows</li>
</ul>

<a class="btn" href="https://github.com/Ashita2619" target="_blank">GitHub</a>
`
},

{
title: "EXPERIENCE",
content: `
<h2>Experience</h2>

<p class="text"><b>Bioinformatician — KDHE</b></p>
<ul class="text">
<li>NGS pipelines</li>
<li>Variant calling & assembly</li>
</ul>

<p class="text"><b>Computational Biologist — BitGenome</b></p>
<ul class="text">
<li>Mentorship & teaching</li>
</ul>
`
},

{
title: "RESEARCH",
content: `
<h2>Research</h2>

<p class="text">
Microplastics detection (2021)
</p>

<p class="text">
COVID statistical modeling
</p>
`
},

{
title: "STACK",
content: `
<h2>Tech Stack</h2>

<span class="tag">Python</span>
<span class="tag">R</span>
<span class="tag">SQL</span>
<span class="tag">Nextflow</span>
<span class="tag">Docker</span>
`
}

];

/* ===== INIT ===== */
function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  camera.position.z = 25;

  dna = new THREE.Group();
  for(let i=0;i<12;i++){
    const data = nodes[i % nodes.length];
    const angle = i * 0.5;
    const y = i * 1.5 - 8;

    const s = new THREE.Mesh(
      new THREE.SphereGeometry(0.4,32,32),
      new THREE.MeshBasicMaterial({color: i%2 ? 0x00ffaa : 0x5e9eff})
    );

    s.position.set(Math.cos(angle)*4, y, Math.sin(angle)*4);
    s.userData = data;
    dna.add(s);
  }
  dna.visible = false;
  scene.add(dna);

  rain = new THREE.Group();
  for(let i=0;i<40;i++){
    const s = new THREE.Mesh(
      new THREE.SphereGeometry(0.05),
      new THREE.MeshBasicMaterial({color: 0x00ffaa})
    );
    s.position.set(Math.random()*20-10, Math.random()*20-10, Math.random()*20-10);
    s.userData.speed = Math.random()*0.02;
    rain.add(s);
  }
  rain.visible = false;
  scene.add(rain);

  window.addEventListener("click", onClick);
  window.addEventListener("mousemove", e=>{
    mouse.x = (e.clientX/window.innerWidth)*2-1;
    mouse.y = -(e.clientY/window.innerHeight)*2+1;
  });

  animate();
}

/* ===== INTRO ===== */
document.getElementById("boot-screen").addEventListener("click", ()=>{
  const boot = document.getElementById("boot-screen");

  gsap.to(boot, {
    opacity:0,
    duration:0.8,
    onComplete: ()=> boot.style.display="none"
  });

  gsap.to(camera.position, {
    z:12,
    duration:1.5,
    onComplete: ()=>{
      dna.visible = true;
      rain.visible = true;
      gsap.to(camera.position, { z:18, duration:1 });
    }
  });
});

/* ===== CLICK ===== */
function onClick(){
  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects(dna.children);

  if(hits.length){
    const data = hits[0].object.userData;
    const panel = document.getElementById("info-panel");

    panel.style.display="block";
    document.getElementById("content-area").innerHTML = data.content;
  }
}

function closePanel(){
  document.getElementById("info-panel").style.display="none";
}

/* ===== ANIMATE ===== */
function animate(){
  requestAnimationFrame(animate);

  dna.rotation.y += 0.003;

  rain.children.forEach(p=>{
    p.position.y -= p.userData.speed;
    if(p.position.y < -10) p.position.y = 10;
  });

  renderer.render(scene,camera);
}

window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

init();
</script>
</body>
</html>
